<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RTMS Check-in Station v1.3.1</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        #reader { width: 100% !important; border: none !important; border-radius: 1.5rem; overflow: hidden; background: #000; position: relative; min-height: 300px; }
        #reader video { object-fit: cover !important; border-radius: 1.5rem; width: 100% !important; height: auto !important; cursor: pointer; }
        .scan-line { animation: scan 2s linear infinite; height: 3px; background: #10b981; box-shadow: 0 0 15px #10b981; z-index: 20; position: absolute; left: 0; right: 0; pointer-events: none; }
        @keyframes scan { 0% { top: 20%; } 100% { top: 80%; } }
        .log-item { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

    <header class="w-full max-w-5xl flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-lg shadow-lg">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            </div>
            <div>
                <h1 class="text-xl font-black tracking-tighter">RTMS <span class="text-blue-400">CHECK-IN</span></h1>
                <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Mobile & Logs Build v1.3.1</p>
            </div>
        </div>
        <button onclick="exportCheckInCSV()" class="bg-emerald-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-lg transition-all active:scale-95">
            💾 Export CSV
        </button>
    </header>

    <main class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
        <div class="space-y-4">
            <div class="bg-gray-800 rounded-3xl p-4 border border-white/5 shadow-2xl">
                <div class="flex flex-col gap-3 mb-4">
                    <select id="camera-select" class="w-full bg-gray-900 text-white text-xs px-4 py-3 rounded-xl border border-white/10 outline-none"></select>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="requestPermission()" class="bg-indigo-600 text-white py-3 rounded-xl text-[10px] font-black uppercase shadow-xl">1. ขอสิทธิ์กล้อง</button>
                        <button id="btn-start" onclick="startScanner()" class="bg-blue-600 text-white py-3 rounded-xl text-[10px] font-black uppercase shadow-xl hidden">2. เริ่มสแกนกล้องหลัง</button>
                    </div>
                </div>
                <div id="reader"></div>
            </div>
            <div id="status-container" class="text-center p-3 bg-slate-900 bg-opacity-50 rounded-2xl border border-white/10">
                <p id="status-text" class="text-indigo-300 font-bold text-xs">สถานะ: รอการเริ่มระบบ</p>
            </div>
        </div>

        <div id="result-container" class="space-y-4">
            <div id="result-card" class="bg-white text-gray-900 rounded-3xl p-8 shadow-2xl flex flex-col items-center justify-center text-center hidden h-full min-h-[350px]">
                <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-6">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                </div>
                <h2 id="res-name" class="text-2xl font-black mb-1 text-indigo-900 uppercase">---</h2>
                <p id="res-unit" class="text-blue-600 font-bold text-sm mb-6 uppercase">---</p>
                <div class="grid grid-cols-2 gap-4 w-full border-t border-gray-100 pt-6">
                    <div class="text-left">
                        <p class="text-[10px] font-bold text-gray-400 uppercase">ประเภท</p>
                        <p id="res-type" class="font-bold text-sm text-gray-700">-</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-bold text-gray-400 uppercase">เวลาเข้างาน</p>
                        <p id="res-time" class="font-bold text-sm text-green-600">-</p>
                    </div>
                </div>
            </div>

            <div id="standby-card" class="bg-gray-800 bg-opacity-50 rounded-3xl p-8 border-2 border-dashed border-white border-opacity-10 flex flex-col items-center justify-center text-center h-full min-h-[350px]">
                <div class="w-16 h-16 bg-gray-700 rounded-full flex items-center justify-center mb-4 opacity-40">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><rect x="7" y="7" width="3" height="3"></rect><rect x="14" y="7" width="3" height="3"></rect><rect x="7" y="14" width="3" height="3"></rect><rect x="14" y="14" width="3" height="3"></rect></svg>
                </div>
                <p class="text-gray-400 font-bold uppercase tracking-[0.2em] text-[10px]">Ready for Scanning...</p>
            </div>
        </div>
    </main>

    <section class="w-full max-w-5xl">
        <div class="bg-gray-800 rounded-3xl p-6 border border-white/5 shadow-xl">
            <h3 class="text-xs font-black uppercase tracking-[0.3em] text-gray-400 mb-4 flex items-center gap-2">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> ประวัติการเช็คอินล่าสุด (Real-time Logs)
            </h3>
            <div id="log-list" class="space-y-2 max-h-[250px] overflow-y-auto pr-2">
                <p class="text-[10px] text-gray-500 text-center py-4 italic">ยังไม่มีประวัติการเช็คอินในรอบนี้</p>
            </div>
        </div>
    </section>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyClnFib72Jwn2umtlG0fD4jBaE-aG1ceWk",
            authDomain: "rtcdb-66284.firebaseapp.com",
            projectId: "rtcdb-66284",
            appId: "1:800467259752:web:961e90546df3390e2b06dd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const appId = "military-system-v12";

        let html5Qr;
        let isProcessing = false;

        async function requestPermission() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                stream.getTracks().forEach(track => track.stop());
                await getCameras();
                document.getElementById('btn-start').classList.remove('hidden');
                document.getElementById('status-text').innerText = "✅ เลือกกล้องแล้วกดเริ่มสแกน";
                loadRecentLogs(); // โหลด Logs เมื่อเริ่มระบบ
            } catch (err) { alert("กรุณาอนุญาตให้ใช้งานกล้องที่ Address Bar"); }
        }

        async function getCameras() {
            const devices = await Html5Qrcode.getCameras();
            const select = document.getElementById('camera-select');
            if (devices && devices.length > 0) {
                select.innerHTML = '';
                // เรียงเอากล้องหลังขึ้นก่อน
                devices.sort((a, b) => a.label.toLowerCase().includes('back') ? -1 : 1);
                devices.forEach((device, index) => {
                    const opt = document.createElement('option');
                    opt.value = device.id;
                    opt.text = device.label || `Camera ${index + 1}`;
                    select.appendChild(opt);
                });
            }
        }

        function startScanner() {
            const cameraId = document.getElementById('camera-select').value;
            if (html5Qr) { html5Qr.stop().then(() => doStart(cameraId)).catch(() => doStart(cameraId)); }
            else { doStart(cameraId); }
        }

        function doStart(cameraId) {
            html5Qr = new Html5Qrcode("reader");
            const config = { 
                fps: 20, 
                qrbox: (w, h) => ({ width: Math.min(w, h) * 0.7, height: Math.min(w, h) * 0.7 }),
                aspectRatio: 1.0,
                // แก้ไข: ระบุ Facing Mode ใน Constraint เพื่อสลับกล้องหลังมือถือ
                videoConstraints: { facingMode: "environment" }
            };
            
            html5Qr.start(cameraId, config, onScanSuccess)
            .then(() => { 
                document.getElementById('status-text').innerText = "🟢 สแกนเนอร์พร้อมทำงาน (กล้องหลัง)";
            })
            .catch(err => { document.getElementById('status-text').innerText = `❌ Error: ${err}`; });
        }

        async function onScanSuccess(decodedText) {
            if (isProcessing) return;
            isProcessing = true;
            try {
                let personId = decodedText.includes('?p=') ? decodedText.split('?p=')[1].split('&')[0].trim() : decodedText.trim();
                let personData = null;
                let colName = '';

                const semDoc = await db.collection(`artifacts/${appId}/public/data/seminar`).doc(personId).get();
                if (semDoc.exists) { personData = semDoc.data(); colName = 'Seminar'; }
                else {
                    const guestDoc = await db.collection(`artifacts/${appId}/public/data/guests`).doc(personId).get();
                    if (guestDoc.exists) { personData = guestDoc.data(); colName = personData.category || 'Guest'; }
                }

                if (personData) {
                    const now = new Date();
                    const name = `${personData.rank || ''} ${personData.firstName} ${personData.lastName}`;
                    const unit = personData.unitName || personData.unit || 'ไม่ระบุหน่วย';

                    document.getElementById('res-name').innerText = name;
                    document.getElementById('res-unit').innerText = unit;
                    document.getElementById('res-type').innerText = colName;
                    document.getElementById('res-time').innerText = now.toLocaleTimeString('th-TH');

                    document.getElementById('standby-card').classList.add('hidden');
                    document.getElementById('result-card').classList.remove('hidden');

                    await db.collection(`artifacts/${appId}/public/data/checkins`).add({
                        personId: personId,
                        name: name,
                        unit: unit,
                        type: colName,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        checkInDate: now.toLocaleString('th-TH')
                    });

                    new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();
                    loadRecentLogs(); // อัปเดต Logs ทันที

                    setTimeout(() => {
                        document.getElementById('result-card').classList.add('hidden');
                        document.getElementById('standby-card').classList.remove('hidden');
                        isProcessing = false;
                        document.getElementById('status-text').innerText = "🟢 พร้อมสแกนคนถัดไป";
                    }, 3000);
                } else {
                    document.getElementById('status-text').innerText = `⚠️ ไม่พบรหัส: ${personId}`;
                    new Audio('https://assets.mixkit.co/active_storage/sfx/2873/2873-preview.mp3').play();
                    setTimeout(() => { isProcessing = false; }, 2000);
                }
            } catch (error) { isProcessing = false; }
        }

        // ฟังก์ชันโหลดและแสดง Logs [Real-time]
        async function loadRecentLogs() {
            const logList = document.getElementById('log-list');
            try {
                const snap = await db.collection(`artifacts/${appId}/public/data/checkins`)
                                   .orderBy('timestamp', 'desc')
                                   .limit(5)
                                   .get();
                
                if (snap.empty) return;
                
                logList.innerHTML = snap.docs.map(doc => `
                    <div class="log-item bg-slate-900/50 p-3 rounded-xl border border-white/5 flex justify-between items-center">
                        <div class="flex flex-col">
                            <span class="text-[11px] font-black text-white">${doc.data().name}</span>
                            <span class="text-[9px] text-gray-400 font-bold uppercase">${doc.data().unit} | ${doc.data().type}</span>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] font-bold text-emerald-400">${doc.data().checkInDate.split(' ')[1]}</span>
                        </div>
                    </div>
                `).join('');
            } catch (err) { console.error("Log error:", err); }
        }

        async function exportCheckInCSV() {
            try {
                const snapshot = await db.collection(`artifacts/${appId}/public/data/checkins`).orderBy('timestamp', 'desc').get();
                if (snapshot.empty) return alert("ไม่มีข้อมูล");
                const data = snapshot.docs.map(doc => ({
                    "รหัส": doc.data().personId,
                    "ชื่อ-นามสกุล": doc.data().name,
                    "หน่วยงาน": doc.data().unit,
                    "ประเภท": doc.data().type,
                    "เวลาเช็คอิน": doc.data().checkInDate
                }));
                const csv = Papa.unparse(data);
                const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `RTMS_CheckIn_Data.csv`;
                a.click();
            } catch (error) { alert("Error Exporting"); }
        }
    </script>
</body>
</html>
