// ── STABLE INPUT: local state, commit only on blur, never reset while focused ──
const StableInput = ({ value, onChange, className, placeholder, type = "text" }) => {
    const [local, setLocal] = useState(value ?? '');
    const isFocused = useRef(false);
    const lastExternal = useRef(value ?? '');

    // Only sync from parent when: not focused AND parent value truly changed from outside
    useEffect(() => {
        if (!isFocused.current && value !== lastExternal.current) {
            lastExternal.current = value ?? '';
            setLocal(value ?? '');
        }
    }, [value]);

    const handleFocus = () => { isFocused.current = true; };
    const handleChange = (e) => { setLocal(e.target.value); };
    const handleBlur = () => {
        isFocused.current = false;
        lastExternal.current = local;
        onChange(local);
    };
    return (
        <input
            type={type}
            className={className}
            value={local}
            placeholder={placeholder}
            onFocus={handleFocus}
            onChange={handleChange}
            onBlur={handleBlur}
        />
    );
};

// Color picker with stable input
const StableColorInput = ({ value, onChange, className }) => {
    const [local, setLocal] = useState(value);
    useEffect(() => { setLocal(value); }, [value]);

        <input
            type="color"
            className={className}
            value={local}
            onChange={e => { setLocal(e.target.value); onChange(e.target.value); }}

    );
};

// ──────────────────────────────────────────────
// DRAG-AND-DROP FIELD ORDER COMPONENT
// Fixed: (1) no Icon component → no flicker
//        (2) onDragOver preventDefault → drag works
//        (3) dragOver index tracked correctly
// ──────────────────────────────────────────────
const DraggableFieldList = ({ fieldDefs, visible, order, onToggle, onReorder, adminProfile }) => {
    const dragItem = useRef(null);
    const [dragOverIdx, setDragOverIdx] = useState(null);

    const orderedFields = (() => {
        const result = [...order].map(k => fieldDefs.find(f => f.key === k)).filter(Boolean);
        fieldDefs.forEach(f => { if (!order.includes(f.key)) result.push(f); });
        return result;
    })();

    const handleDragStart = (e, idx) => {
        dragItem.current = idx;
        e.dataTransfer.effectAllowed = 'move';
    };
    const handleDragOver = (e, idx) => {
        e.preventDefault(); // REQUIRED for drop to fire
        e.dataTransfer.dropEffect = 'move';
        setDragOverIdx(idx);
    };
    const handleDragLeave = () => { setDragOverIdx(null); };
    const handleDrop = (e, idx) => {
        e.preventDefault();
        setDragOverIdx(null);
        if (dragItem.current === null || dragItem.current === idx) { dragItem.current = null; return; }
        const newOrder = orderedFields.map(f => f.key);
        const [moved] = newOrder.splice(dragItem.current, 1);
        newOrder.splice(idx, 0, moved);
        dragItem.current = null;
        onReorder(newOrder);
    };
    const handleDragEnd = () => { setDragOverIdx(null); dragItem.current = null; };

    return (
        <div className="space-y-1">
            {orderedFields.map((f, idx) => {
                if (!adminProfile && f.adminOnly) return null;
                const isVisible = visible[f.key] !== false;
                const isOver = dragOverIdx === idx;
                return (
                    <div
                        key={f.key}
                        draggable
                        onDragStart={e => handleDragStart(e, idx)}
                        onDragOver={e => handleDragOver(e, idx)}
                        onDragLeave={handleDragLeave}
                        onDrop={e => handleDrop(e, idx)}
                        onDragEnd={handleDragEnd}
                        style={{cursor:'grab', userSelect:'none', transition:'background 0.1s'}}
                        className={`flex items-center justify-between gap-3 py-2 px-2 rounded-lg border ${isOver ? 'bg-indigo-50 border-indigo-300' : isVisible ? 'bg-white border-slate-200' : 'bg-slate-50 border-transparent opacity-50'}`}
                    >
                        {/* ── grip: plain text, no Icon component, no flicker ── */}
                        <span style={{fontSize:'14px',color:'#cbd5e1',flexShrink:0,lineHeight:1}}>⠿</span>
                        <div className="flex items-center gap-2 flex-1 min-w-0">
                            <span className="text-[11px] font-bold text-slate-700 truncate">{f.label}</span>
                            {f.adminOnly && <span className="text-[8px] font-bold bg-rose-50 text-rose-400 px-1 py-0.5 rounded shrink-0">Admin</span>}
                            <span className="text-[9px] text-slate-300 font-bold shrink-0">{f.section}</span>
                        </div>
                        <div
                            onMouseDown={e => e.stopPropagation()}
                            onClick={e => { e.stopPropagation(); onToggle(f.key); }}
                            className={`w-10 h-5 rounded-full transition-all relative cursor-pointer shrink-0 ${isVisible ? 'bg-indigo-500' : 'bg-slate-200'}`}
                        >
                            <div className={`w-4 h-4 bg-white rounded-full absolute top-0.5 transition-all shadow ${isVisible ? 'left-5' : 'left-0.5'}`}></div>
                        </div>
                    </div>
                );
            })}
        </div>
    );
};

    const logAction = async (action, details = "") => {

    const maskPhoneNumber = (phone) => {
        if (!phone || phone.length < 9) return phone;
        const p = phone.replace(/\D/g, '');
        if (p.length < 9) return phone;
        return `${p.substring(0, 3)}-XXX-${p.substring(p.length - 4)}`;
    };

    const formatPhone = (phone) => {
        if (!phone) return '-';
        const p = phone.replace(/\D/g, '');
        if (p.length !== 10) return phone;
        return `${p.substring(0, 3)}-${p.substring(3, 6)}-${p.substring(6)}`;
    };

    const processCSVText = async (text, collectionName) => {
        if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
        const rows = [];
        let row = [], inQuotes = false, val = '';
        for (let i = 0; i < text.length; i++) {
            let char = text[i], nextChar = text[i+1];
            if (char === '"' && inQuotes && nextChar === '"') { val += '"'; i++; }
            else if (char === '"') { inQuotes = !inQuotes; }
            else if (char === ',' && !inQuotes) { row.push(val); val = ''; }
            else if ((char === '\n' || char === '\r') && !inQuotes) {
                if (char === '\r' && nextChar === '\n') i++;
                row.push(val); rows.push(row); row = []; val = '';
            } else { val += char; }
        }
        if (val || row.length > 0) { row.push(val); rows.push(row); }
        if (rows.length < 2) return showStatus("ไฟล์ CSV ไม่มีข้อมูลเพียงพอ");
        const headers = rows[0].map(h => h.trim());
        let count = 0, batch = writeBatch(), operations = 0;
        for (let i = 1; i < rows.length; i++) {
            if (rows[i].length === 0 || (rows[i].length === 1 && !rows[i][0])) continue;
            const data = {};
            let hasData = false;
            headers.forEach((h, index) => { let cellValue = rows[i][index]; if (cellValue !== undefined && h) { data[h] = cellValue; hasData = true; } });
            if (hasData) {
                let docId = data.id || data.docId;
                if (!docId) {
                    const prefix = collectionName === 'seminar' ? 'P' : (collectionName === 'guests' ? 'S' : collectionName.charAt(0).toUpperCase());
                    docId = `${prefix}${Date.now()}_${i}`;
                }
                delete data.id; delete data.docId;
                batch.set(baseRef(collectionName).doc(docId), data, { merge: true });
                count++; operations++;
                if (operations >= 490) { await batch.commit(); batch = writeBatch(); operations = 0; }
            }
        }
        if (operations > 0) await batch.commit();
        logAction(`IMPORT_${collectionName.toUpperCase()}`, `นำเข้า ${count} รายการ`);
        showStatus(`นำเข้าข้อมูล ${count} รายการเสร็จสิ้น`);
    };

const handleExportCSV = (collectionName) => {
    // 1. ดึงข้อมูลจาก State ตามประเภท (seminar, guests, units, rooms)
    let exportData = [];
    if (collectionName === 'seminar') exportData = seminar;
    else if (collectionName === 'guests') exportData = guests;
    else if (collectionName === 'units') exportData = units;
    else if (collectionName === 'rooms') exportData = rooms;
    
    // 2. ตรวจสอบว่ามีข้อมูลหรือไม่
    if (!exportData || exportData.length === 0) {
        showStatus("⚠️ ไม่พบข้อมูลสำหรับส่งออกในหมวด: " + collectionName);
        return;
    }

    let csvRows = [];

    // 3. Mapping หัวตารางภาษาไทยให้ตรงกับส่วน Import
    if (collectionName === 'seminar') {
        csvRows = exportData.map(item => ({
            "id": item.id || "",
            "ประทับเวลา": item.createdAt || "",
            "กองทัพภาค": item.region || "",
            "หน่วย": item.unitName || "",
            "ยศ": item.rank || "",
            "ชื่อ": item.firstName || "",
            "สกุล": item.lastName || "",
            "ชื่อเล่น": item.nickname || "",
            "เบอร์มือถือ": item.phone || "",
            "Line ID": item.lineId || "",
            "ตำแหน่ง": item.position || "",
            "กำเนิด": item.origin || "",
            "กำเนิดอื่น": item.originOther || "",
            "รุ่น": item.batch || "",
            "ปี": item.year || "",
            "นป. รุ่น": item.npBatch || "",
            "นป. ปี": item.npYear || "",
            "ประสบการณ์การเป็นผู้ฝึกทหารใหม่": item.trainingExp || "",
            "การเดินทาง": item.travelBy || "",
            "การขอห้องพัก": item.roomTypePref || "",
            "ชำระห้องเดี่ยว": item.paymentStatus || "",
            "การรับประทานอาหาร": item.dietary || "",
            "หมายเหตุ": item.remarks || "",
            "roomID": item.roomId || "",
            "เบิก": item.disbursement || "",
            "updatedAt": item.updatedAt || ""
        }));
    } else {
        // สำหรับหมวดอื่นให้ส่งออกตามโครงสร้างปกติ
        csvRows = exportData;
    }

    try {
        // 4. แปลงข้อมูลเป็น CSV (ต้องมั่นใจว่ามี Library PapaParse)
        if (typeof Papa === 'undefined') {
            showStatus("❌ ไม่พบ Library PapaParse ในหน้าเว็บ");
            return;
        }
        
        const csvString = Papa.unparse(csvRows);
        
        // 5. สร้างไฟล์ดาวน์โหลด + BOM (\ufeff) เพื่อให้ Excel อ่านภาษาไทยออก
        const blob = new Blob(["\ufeff" + csvString], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        
        link.href = url;
        link.setAttribute('download', `${collectionName}_export.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        // 6. แจ้งสถานะ (ส่งเฉพาะ String เพื่อแก้ปัญหา [object Object])
        showStatus(`✅ ส่งออกข้อมูล ${exportData.length} รายการสำเร็จ`);
        
    } catch (err) {
        console.error("Export Error:", err);
        showStatus("❌ เกิดข้อผิดพลาดในการสร้างไฟล์ CSV");
    }
};

const handleImportCSV = (e, collectionName) => {
    const file = e.target.files[0];
    if (!file) return;

    showStatus("⏳ กำลังเตรียมการนำเข้าข้อมูล...");

    Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        complete: async (res) => {
            const batch = db.batch();
            const now = new Date().toLocaleString('th-TH');
            
            // ฟังก์ชันดึงข้อมูลแบบฉลาด (Smart Mapping)
            const getVal = (row, keys) => {
                for (let key of keys) {
                    if (row[key] !== undefined && row[key] !== null && row[key] !== "") {
                        return row[key].toString().trim();
                    }
                }
                return "";
            };

            res.data.forEach(row => {
                const mappedData = {
                    id: getVal(row, ["id", "ID", "รหัส"]).toUpperCase(),
                    createdAt: getVal(row, ["ประทับเวลา", "สร้างเมื่อ", "createdAt"]),
                    updatedAt: now,
                    region: (() => {
                        const rawRegion = getVal(row, ["กองทัพภาค", "region"]);
                        if (rawRegion.includes("ทภ.1")) return "ทภ.1";
                        if (rawRegion.includes("ทภ.2")) return "ทภ.2";
                        if (rawRegion.includes("ทภ.3")) return "ทภ.3";
                        if (rawRegion.includes("ทภ.4")) return "ทภ.4";
                        if (rawRegion.includes("นขต.ทบ.")) return "นขต.ทบ.";
                        return rawRegion;
                    })(),
                    unitName: getVal(row, ["หน่วย", "unitName"]),
                    rank: getVal(row, ["ยศ", "rank"]),
                    firstName: getVal(row, ["ชื่อ", "firstName"]),
                    lastName: getVal(row, ["สกุล", "lastName"]),
                    nickname: getVal(row, ["ชื่อเล่น", "nickname"]),
                    phone: getVal(row, ["เบอร์มือถือ", "phone"]),
                    lineId: getVal(row, ["Line ID", "lineId"]),
                    position: getVal(row, ["ตำแหน่ง", "position"]),
                    origin: getVal(row, ["กำเนิด", "origin"]),
                    originOther: getVal(row, ["กำเนิดอื่น", "originOther"]),
                    batch: getVal(row, ["รุ่น", "batch"]),
                    year: getVal(row, ["ปี", "year", "ปี พ.ศ."]),
                    npBatch: getVal(row, ["นป. รุ่น", "npBatch"]),
                    npYear: getVal(row, ["นป. ปี", "npYear"]),
                    trainingExp: (() => {
                        const rawExp = getVal(row, ["ประสบการณ์การเป็นผู้ฝึกทหารใหม่", "ประสบการณ์ฝึก", "trainingExp"]);
                        if (rawExp.includes("ไม่เคย")) return "ไม่เคยฝึก";
                        if (rawExp.includes("1-2") || rawExp.includes("1 - 2")) return "1-2 ผลัด";
                        if (rawExp.includes("3-4") || rawExp.includes("3 - 4")) return "3-4 ผลัด";
                        return rawExp;
                    })(),
                    travelBy: (() => {
                        const rawTravel = getVal(row, ["การเดินทาง", "travelBy"]);
                        if (rawTravel.includes("รถบัส") || rawTravel.includes("รวม")) return "รถรวม";
                        if (rawTravel.includes("ส่วนบุคคล") || rawTravel.includes("ส่วนตัว")) return "รถส่วนตัว";
                        return rawTravel || "รถรวม";
                    })(),
                    roomTypePref: (() => {
                        const rawRoom = getVal(row, ["การขอห้องพัก", "ห้องพัก", "roomTypePref"]);
                        if (rawRoom.includes("พักรวม")) return "พักรวม";
                        if (rawRoom.includes("เดี่ยว")) return "พักเดี่ยว";
                        if (rawRoom.includes("ไม่ประสงค์")) return "ไม่พัก";
                        return rawRoom || "พักรวม";
                    })(),
                    paymentStatus: getVal(row, ["ชำระห้องเดี่ยว", "paymentStatus"]) || "ยังไม่จ่าย",
                    dietary: (() => {
                        const rawDiet = getVal(row, ["การรับประทานอาหาร", "อาหาร", "dietary"]);
                        if (rawDiet.includes("ไม่มีข้อจำกัด")) return "ไม่มีข้อจำกัดด้านอาหาร";
                        if (rawDiet.includes("อิสลาม")) return "อาหารอิสลาม";
                        if (rawDiet.includes("มังสวิรัติ")) return "มังสวิรัติ";
                        if (rawDiet.includes("ทะเล") || rawDiet.includes("กุ้ง")) return "แพ้อาหารทะเล";
                        return rawDiet || "ไม่มีข้อจำกัดด้านอาหาร";
                    })(),
                    remarks: getVal(row, ["หมายเหตุ", "remarks"]),
                    roomId: getVal(row, ["roomID", "roomId", "ห้องพัก"]),
                    disbursement: getVal(row, ["เบิก", "disbursement"]) || "เบิกไม่ได้"
                };

                if (mappedData.id) {
                    const docRef = baseRef(collectionName).doc(mappedData.id);
                    batch.set(docRef, mappedData, { merge: true });
                }
            });

            try {
                await batch.commit();
                showStatus(`✅ นำเข้าข้อมูลสำเร็จ (ID ซ้ำจะทำการอัปเดตข้อมูลล่าสุด)`);
                logAction(`IMPORT_${collectionName.toUpperCase()}`, `นำเข้าสำเร็จ`);
            } catch (err) {
                console.error(err);
                showStatus("❌ เกิดข้อผิดพลาดในการบันทึกข้อมูล");
            }
        }
    });
    e.target.value = null;
};

    const importFromGoogleSheet = async (sheetName) => {
        if (!confirm(`ยืนยันการดึงข้อมูลจาก Google Sheet: ${sheetName}?`)) return;
        showStatus(`กำลังดึงข้อมูล ${sheetName}...`);
        try {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error("ไม่สามารถอ่านข้อมูลได้");
            const csvText = await response.text();
            if (csvText.startsWith("<!DOCTYPE html>")) throw new Error("ไม่ได้รับอนุญาต");
            await processCSVText(csvText, sheetName);
        } catch (err) { showStatus("เกิดข้อผิดพลาด: " + err.message); }
    };

    useEffect(() => {
        const timer = setInterval(() => setCurrentTime(new Date()), 1000);
        return () => clearInterval(timer);
    }, []);

    useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const p = params.get('p');
        if (p) { pendingUrlParam.current = p.trim(); window.history.replaceState({}, document.title, window.location.pathname); }
    }, []);

    const formatDateTime = (date) => {
        const days = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
        const months = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
        const h = String(date.getHours()).padStart(2, '0');
        const m = String(date.getMinutes()).padStart(2, '0');
        const s = String(date.getSeconds()).padStart(2, '0');
        return `GMT+7 วัน${days[date.getDay()]}ที่ ${date.getDate()} ${months[date.getMonth()]} พ.ศ. ${date.getFullYear()+543} เวลา ${h}.${m}.${s}`;
    };

    useEffect(() => {
        auth.signInAnonymously().catch(e => console.warn(e));
        const unsubs = [
            baseRef('seminar').onSnapshot(s => setSeminar(s.docs.map(d => ({ id: d.id, ...d.data() }))), e => console.warn(e)),
            baseRef('guests').onSnapshot(s => setGuests(s.docs.map(d => ({ id: d.id, ...d.data() }))), e => console.warn(e)),
            baseRef('rooms').onSnapshot(s => setRooms(s.docs.map(d => ({ id: d.id, ...d.data() }))), e => console.warn(e)),
            baseRef('logs').onSnapshot(s => setLogs(s.docs.map(d => ({ id: d.id, ...d.data() }))), e => console.warn(e)),
            baseRef('units').onSnapshot(s => {
                const data = s.docs.map(d => ({ docId: d.id, ...d.data() }));
                setUnits(data.sort((a, b) => parseInt(a.id || "0") - parseInt(b.id || "0")));
            }, err => { console.error(err); showStatus("⚠️ ไม่สามารถดึงข้อมูลหน่วยได้"); }),
            baseRef('admins').onSnapshot(s => {
                const data = s.docs.map(d => ({ id: d.id, ...d.data() }));
                setAdmins(data);
                if (data.length === 0) baseRef('admins').doc('admin_default').set({ name: 'Super Admin', username: 'admin', password: 'password', roles: ['SUPER_ADMIN'] }).catch(() => {});
                setIsDataLoaded(true);
            }, err => { console.error(err); setIsDataLoaded(true); setLoginError("⚠️ Firebase Rules error"); }),
            baseRef('settings').doc('display').onSnapshot(snap => {
                if (!snap.exists) return;
                // Don't overwrite local unsaved changes
                setSettingsDirty(dirty => {
                    if (dirty) return dirty; // skip update if user has local edits
                    const d = snap.data();
                    if (d.dispCfg) {
                        const migrateDisp = (saved, defaults, allKeys) => {
                            if (saved && typeof saved.visible === 'object') {
                                return {
                                    visible: { ...defaults.visible, ...saved.visible },
                                    order: saved.order?.length ? saved.order : allKeys,
                                };
                            }
                            if (saved && typeof saved === 'object' && !saved.visible) {
                                return { visible: { ...defaults.visible, ...saved }, order: allKeys };
                            }
                            return defaults;
                        };
                        setDispCfg({
                            seminar: migrateDisp(d.dispCfg.seminar, DEFAULT_DISP.seminar, SEMINAR_FIELD_KEYS),
                            guest:   migrateDisp(d.dispCfg.guest,   DEFAULT_DISP.guest,   GUEST_FIELD_KEYS),
                        });
                    }
                    if (d.cardCfg) {
                        const saved = d.cardCfg;
                        const mergedCard = { ...DEFAULT_CARD, ...saved };
                        if (!saved.cardFields) {
                            mergedCard.cardFields = {
                                visible: {
                                    type:true, rank:true, fullName:true, nickname:true,
                                    region: saved.showRegion !== false,
                                    phone: saved.showPhone === true,
                                    lineId: saved.showPhone === true,
                                    position: saved.showPosition !== false,
                                    unit: saved.showUnit !== false,
                                    qr: saved.showQR !== false,
                                    id: true,
                                },
                                order: DEFAULT_CARD.cardFields.order,
                            };
                        } else {
                            mergedCard.cardFields = {
                                visible: { ...DEFAULT_CARD.cardFields.visible, ...saved.cardFields.visible },
                                order: saved.cardFields.order?.length ? saved.cardFields.order : DEFAULT_CARD.cardFields.order,
                            };
                        }
                        if (!mergedCard.font) mergedCard.font = 'sarabun';
                        if (!mergedCard.layout) mergedCard.layout = 'standard';
                        // Migrate old px range (7-18) to new pt range (72-96)
                        if (!mergedCard.nicknameFontSize || mergedCard.nicknameFontSize < 50) mergedCard.nicknameFontSize = 80;
                        setCardCfg(mergedCard);
                    }
                    return false;
                });
            }, () => {})
        ];
        return () => unsubs.forEach(u => u());
    }, []);

    useEffect(() => {
        const pid = pendingUrlParam.current;
        if (!pid || hasCheckedUrl.current) return;
        const upperPid = pid.toUpperCase();
        const inSeminar = seminar.find(s => String(s.id).toUpperCase() === upperPid);
        if (inSeminar) { setSelectedPerson({ ...inSeminar, type: 'seminar' }); hasCheckedUrl.current = true; pendingUrlParam.current = null; return; }

                        {!adminProfile ?

                                <div className="flex flex-col items-end leading-none">
                                    <span className="text-[10px] font-bold text-white">{adminProfile.name}</span>
                                    <div className="mt-1">{(adminProfile.roles || []).map(r => <span key={r} className={`role-tag ${ROLES_CONFIG[r]?.color}`}>{ROLES_CONFIG[r]?.label}</span>)}</div>
                                </div>
                                <button onClick={() => { setAdminProfile(null); handleNav('seminar'); }} className="p-2 text-rose-400 hover:bg-rose-500/10 rounded-lg transition-all"><Icon name="log-out" size={16} /></button>
                            </div>
                        }
                    </div>
                </header>
                <div className="bg-slate-800 text-slate-300 text-center py-1.5 text-[10px] font-bold tracking-widest border-b border-slate-700">

            <main className="flex-1 p-6 max-w-7xl mx-auto w-full">

                            <button disabled={!isDataLoaded} className="w-full py-4 bg-slate-900 text-white font-bold rounded-2xl shadow-lg uppercase text-sm tracking-widest leading-none disabled:opacity-50">
                                {isDataLoaded ? "เข้าสู่ระบบ" : "กำลังตรวจสอบ..."}

                ) : activeSheet === 'units' ? (
                    <div className="space-y-6">

                                <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">ฐานข้อมูล: {units.length} หน่วย</span>

                            </div>
                        </div>
                        <div className="relative">
                            <Icon name="search" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                            <input className="w-full pl-12 pr-4 py-4 bg-white border border-slate-200 rounded-2xl shadow-sm outline-none font-bold text-sm focus:border-indigo-500" placeholder="ค้นหารหัส หรือ ชื่อหน่วยงาน..." value={unitSearchTerm} onChange={e => setUnitSearchTerm(e.target.value)} />
                        </div>
                        <div className="bg-white rounded-3xl shadow-xl border overflow-hidden max-h-[60vh] overflow-y-auto no-scrollbar">
                            <table className="w-full text-left text-sm">
                                <thead className="bg-slate-50 border-b text-[10px] font-black text-slate-400 uppercase sticky top-0 z-10">
                                    <tr><th className="px-8 py-5">รหัส</th><th className="px-8 py-5">สังกัด</th><th className="px-8 py-5">ชื่อหน่วยงาน</th>{adminProfile && <th className="px-8 py-5 text-right">จัดการ</th>}</tr>
                                </thead>
                                <tbody className="divide-y divide-slate-50">
                                    {filteredUnits.map((u, i) => (

                                            <td className="px-8 py-4 font-mono font-bold text-slate-400">{u.id}</td>
                                            <td className="px-8 py-4"><span className="px-2 py-0.5 rounded bg-indigo-50 text-indigo-600 font-black text-[10px] border border-indigo-100">{u.region}</span></td>
                                            <td className="px-8 py-4 font-bold text-slate-800">{u.name}</td>
                                            {adminProfile && <td className="px-8 py-4 text-right flex justify-end gap-1">
                                                <button onClick={() => { setIsEditMode(true); setCurrentEditItem(u); setUnitForm(u); setIsUnitModalOpen(true); }} className="p-2 text-slate-300 hover:text-indigo-600"><Icon name="edit-2" size={14} /></button>
                                                <button onClick={async () => { if (confirm(`ลบหน่วย ${u.name}?`)) { await baseRef('units').doc(u.docId).delete(); logAction("DELETE_UNIT", u.name); } }} className="p-2 text-slate-300 hover:text-rose-500"><Icon name="trash-2" size={14} /></button>
                                            </td>}
                                        </tr>

                                    {filteredUnits.length === 0 && <tr><td colSpan="4" className="p-20 text-center text-slate-200 font-bold uppercase opacity-30 italic">ไม่พบข้อมูล</td></tr>}

                            </table>
                        </div>
                    </div>

 ) : activeSheet === 'accommodation' ? (
                    <div className="space-y-6 text-left">
                        <div className="flex gap-6 border-b border-slate-200 mb-6">
                            {['manage','staff','rooms'].map((t, idx) => (
                                <button key={t} onClick={() => setAccSubTab(t)} className={`pb-3 text-xs uppercase font-black tracking-widest transition-all ${accSubTab === t ? 'subtab-active' : 'text-slate-400'}`}>
                                    {['จัดที่พัก','กองอำนวยการ','จัดการห้อง'][idx]}
                                </button>
                            ))}
                        </div>
                        {accSubTab === 'manage' ? (() => {
                            const allPeople = [...seminar.map(s => ({ ...s, type: 'seminar' })), ...guests.map(g => ({ ...g, type: 'guests' }))];
                            const filteredAccRooms = rooms.filter(room => {
                                if (!accRoomSearchTerm) return true;
                                const sl = accRoomSearchTerm.toLowerCase();
                                if (room.roomNo.toLowerCase().includes(sl)) return true;
                                return allPeople.filter(x => x.roomId === room.id).some(occ =>
                                    ((occ.rank === 'อื่นๆ' ? (occ.rankOther || '') : occ.rank) + (occ.firstName || '') + (occ.lastName || '') + (occ.nickname || '') + (occ.unitName || occ.category || '')).toLowerCase().includes(sl)
                                );
                            });
                            const lockedRooms = filteredAccRooms.filter(r => r.isLocked);
                            const unlockedRooms = filteredAccRooms.filter(r => !r.isLocked);
                            return (
                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                    <div className="lg:col-span-8 space-y-4">
                                        <div className="relative">
                                            <Icon name="search" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />

                                        </div>
                                        {lockedRooms.length > 0 && (
                                            <div className="bg-slate-50 p-4 rounded-2xl border shadow-inner flex flex-wrap gap-2 items-center">
                                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest mr-2 flex items-center gap-1"><Icon name="lock" size={12} /> ห้องที่จัดเสร็จแล้ว</span>
                                                {lockedRooms.map(room => (
                                                    <button key={room.id} onClick={() => toggleRoomLock(room.id, true)} className="px-3 py-1.5 bg-white hover:bg-rose-50 text-slate-600 hover:text-rose-600 rounded-xl text-[10px] font-black flex items-center gap-1.5 border border-slate-200 shadow-sm">
                                                        <Icon name="lock" size={12} className="text-emerald-500" /> ห้อง {room.roomNo}
                                                    </button>
                                                ))}
                                            </div>
                                        )}
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {unlockedRooms.map(room => {
                                                const occupants = allPeople.filter(x => x.roomId === room.id);
                                                const cap = room.type === 'พักรวม' ? 2 : 1;
                                                const isFull = occupants.length >= cap;
                                                return (
                                                    <div key={room.id} className="bg-white p-6 rounded-3xl border shadow-sm relative group hover:border-indigo-200">
                                                        <div className="flex justify-between items-start mb-4">
                                                            <div className="text-left flex-1">
                                                                <p className="text-[10px] font-black text-slate-400 uppercase leading-none mb-1">{room.type}</p>
                                                                <div className="flex items-center flex-wrap gap-2">
                                                                    <h4 className="text-2xl font-black text-slate-900 tracking-tighter leading-none">ห้อง {room.roomNo}</h4>
                                                                    {occupants.length > cap && <span className="text-[9px] text-rose-500 font-bold bg-rose-50 px-2 py-0.5 rounded-md border border-rose-100">เกินจำนวน</span>}
                                                                </div>
                                                            </div>
                                                            <div className="flex flex-col items-end gap-2">
                                                                <span className={`px-2 py-0.5 rounded text-[8px] font-bold uppercase ${isFull ? 'bg-rose-500 text-white' : 'bg-emerald-500 text-white'}`}>{isFull ? 'เต็ม' : 'ว่าง'}</span>
                                                                <button onClick={() => toggleRoomLock(room.id, false)} className="p-1.5 bg-slate-100 text-slate-400 hover:bg-emerald-100 hover:text-emerald-600 rounded-lg"><Icon name="unlock" size={14} /></button>
                                                            </div>
                                                        </div>
                                                        <div className="bg-slate-50 p-4 rounded-xl space-y-2 min-h-[100px] border-2 border-dashed flex flex-col justify-center">
                                                            {occupants.map(occ => (
                                                                <div key={occ.id} className="flex justify-between items-center text-[11px] font-bold bg-white p-2.5 rounded-lg border shadow-sm">
                                                                    <div className="truncate">
                                                                        <div className="text-slate-800">{occ.rank === 'อื่นๆ' ? occ.rankOther : occ.rank} {occ.firstName} ({occ.nickname || "-"})</div>
                                                                        <div className="text-[8px] text-indigo-500 uppercase mt-0.5">{occ.unitName || occ.category}</div>
                                                                    </div>
                                                                    <button onClick={() => assignRoom(occ.id, '', occ.type)} className="text-rose-500 font-bold uppercase p-1 ml-2">ออก</button>
                                                                </div>
                                                            ))}
                                                            {occupants.length === 0 && <p className="text-center text-[10px] text-slate-300 font-bold uppercase italic opacity-30">ห้องว่าง</p>}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                    <div className="lg:col-span-4 space-y-4 sticky top-24 h-fit">
                                        <div className="bg-white p-6 rounded-3xl shadow-xl border flex flex-col">
                                            <h4 className="text-xs font-black uppercase tracking-widest text-slate-800 mb-4 flex items-center gap-2 leading-none"><Icon name="users" size={14} /> รอจัดที่พัก</h4>
                                            <div className="relative mb-4">
                                                <Icon name="search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />

                                            </div>
                                            <div className="space-y-3 max-h-[500px] overflow-y-auto no-scrollbar">
                                                {allPeople.filter(p => !p.roomId && ((p.rank === 'อื่นๆ' ? (p.rankOther || '') : p.rank) + (p.firstName || '') + (p.lastName || '') + (p.nickname || '') + (p.unitName || '')).toLowerCase().includes(accSearchTerm.toLowerCase())).map(p => (
                                                    <div key={p.id} className="bg-slate-50 p-3 rounded-2xl border flex flex-col gap-2 hover:border-indigo-200">
                                                        <div className="text-left leading-tight">
                                                            <div className="text-xs font-bold text-slate-800">{p.rank === 'อื่นๆ' ? p.rankOther : p.rank} {p.firstName} ({p.nickname || "-"})</div>
                                                            <div className="text-[9px] text-slate-400 font-bold uppercase mt-0.5">{p.unitName || p.category}</div>
                                                        </div>
                                                        <select className="text-[10px] font-bold p-2.5 border rounded-xl bg-slate-900 text-white cursor-pointer w-full outline-none" onChange={(e) => assignRoom(p.id, e.target.value, p.type)} value="">
                                                            <option value="">เลือกห้องพัก...</option>
                                                            {rooms.map(r => <option key={r.id} value={r.id}>{r.roomNo} ({r.type}) {r.isLocked ? '[ล็อค]' : ''}</option>)}
                                                        </select>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            );
                        })() : accSubTab === 'staff' ? (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center">
                                    <h3 className="font-black uppercase tracking-widest text-slate-800 leading-none">กองอำนวยการ/วิทยากร ({guests.length})</h3>
                                    <button onClick={() => { setIsEditMode(false); setGuestForm({ rank: '', rankOther: '', firstName: '', lastName: '', nickname: '', position: '', category: 'กองอำนวยการ', phone: '', roomId: '', unit: '' }); setIsGuestModalOpen(true); }} className="bg-slate-900 text-white px-6 py-2.5 rounded-xl text-[10px] font-bold uppercase shadow-lg flex items-center gap-2"><Icon name="plus" size={14} /> เพิ่มรายชื่อ</button>
                                </div>
                                <div className="bg-white rounded-3xl shadow-xl border overflow-hidden">
                                    <table className="w-full text-left text-sm">
                                        <thead className="bg-slate-50 border-b text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                            <tr><th className="p-5">ชื่อ-นามสกุล</th><th className="p-5">ตำแหน่ง/หน่วย</th><th className="p-5 text-center">ประเภท</th><th className="p-5 text-center">ห้อง</th><th className="p-5 text-right">จัดการ</th></tr>
                                        </thead>
                                        <tbody className="divide-y">
                                            {guests.map(g => (
                                                <tr key={g.id} className="hover:bg-slate-50">
                                                    <td className="p-5 font-bold cursor-pointer hover:text-indigo-600" onClick={() => setSelectedPerson({ ...g, type: 'guests' })}>
                                                        <div className="text-slate-800 flex items-center gap-2">
                                                            <span>{g.rank === 'อื่นๆ' ? g.rankOther : g.rank} {g.firstName} {g.lastName} <span className="text-indigo-500">({g.nickname || '-'})</span></span>
                                                            <Icon name="qr-code" size={13} className="text-slate-300" />
                                                        </div>
                                                    </td>
                                                    <td className="p-5 font-bold text-[11px] text-slate-500 leading-tight"><div>{g.position}</div><div className="text-[9px] uppercase">{g.unit}</div></td>
                                                    <td className="p-5 text-center"><span className="px-2 py-0.5 rounded bg-slate-100 font-bold text-[9px] uppercase">{g.category}</span></td>
                                                    <td className="p-5 text-center font-black text-rose-500">{rooms.find(r => r.id === g.roomId)?.roomNo || '-'}</td>
                                                    <td className="p-5 text-right flex justify-end gap-1">
                                                        <button onClick={() => { setIsEditMode(true); setCurrentEditItem(g); setGuestForm(g); setIsGuestModalOpen(true); }} className="p-2 text-slate-300 hover:text-indigo-600"><Icon name="edit-2" size={14} /></button>
                                                        <button onClick={async () => { if (confirm("ลบ?")) { await baseRef('guests').doc(g.id).delete(); logAction("DELETE_GUEST", g.firstName); } }} className="p-2 text-slate-300 hover:text-rose-500"><Icon name="trash-2" size={14} /></button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ) : (
/* --- ส่วนจัดการห้องพัก (Room List) ฉบับปรับปรุงตามคำขอ --- */
<div className="bg-slate-50/50 p-8 rounded-[2.5rem] border border-slate-200/60 shadow-sm">
    <div className="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
        <div className="text-left">
            <h3 className="font-black uppercase tracking-widest text-slate-800 text-sm flex items-center gap-2">
                <div className="bg-indigo-600 p-1.5 rounded-lg text-white">
                    <Icon name="home" size={16} />
                </div>
                บริหารจัดการห้องพักทั้งหมด ({rooms.length})
            </h3>
        </div>
        <button onClick={() => { setIsEditMode(false); setRoomForm({ roomNo: '', type: 'พักรวม', guestCategory: 'ผู้เข้าร่วมสัมมนา', checkInStatus: 'ยังไม่รับห้อง' }); setIsRoomModalOpen(true); }} 
            className="bg-slate-900 text-white px-8 py-3.5 rounded-2xl text-[11px] font-black uppercase shadow-xl hover:bg-indigo-600 transition-all flex items-center gap-2">
            <Icon name="plus" size={14} /> เพิ่มห้องพักใหม่
        </button>
    </div>
    
    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
        {rooms.map(room => {
            const occupantsList = [...seminar.map(s => ({...s, type: 'seminar'})), ...guests.map(g => ({...g, type: 'guests'}))]
                                 .filter(p => p.roomId === room.id);
            const occupantsCount = occupantsList.length;
            const cap = room.type === "พักรวม" ? 2 : 1;
            
            // สีสถานะความจุ
            let statusColor = occupantsCount >= cap ? "text-rose-500 bg-rose-50 border-rose-100" : (occupantsCount > 0 ? "text-amber-500 bg-amber-50 border-amber-100" : "text-emerald-500 bg-emerald-50 border-emerald-100");

            return (
                <div key={room.id} className="group bg-white rounded-[2rem] border border-slate-200 shadow-sm hover:shadow-md transition-all duration-300 overflow-hidden relative flex flex-col">
                    
                    {/* 1. ปุ่มจัดการ Admin (ย้ายมาไว้บนขวาแบบ Absolute) */}
                    {adminProfile && (
                        <div className="absolute top-3 right-3 z-10 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onClick={() => { setIsEditMode(true); setCurrentEditItem(room); setRoomForm(room); setIsRoomModalOpen(true); }} className="p-1.5 bg-white/90 text-indigo-600 rounded-lg shadow-sm border border-slate-200 hover:bg-indigo-600 hover:text-white transition-colors"><Icon name="edit-2" size={10}/></button>
                            <button onClick={async () => { if(confirm(`ลบห้อง ${room.roomNo}?`)) await baseRef('rooms').doc(room.id).delete(); }} className="p-1.5 bg-white/90 text-rose-500 rounded-lg shadow-sm border border-slate-200 hover:bg-rose-500 hover:text-white transition-colors"><Icon name="trash-2" size={10}/></button>
                        </div>
                    )}

                    {/* 2. Top Status Bar: ล็อค + ประเภทห้อง + ประเภทผู้พัก (ต่อกันชิดซ้าย) */}
                    <div className="px-4 pt-4 flex items-center flex-wrap gap-1">
                        {room.isLocked && <Icon name="lock" size={12} className="text-rose-500" />}
                        <span className="text-[8px] font-black uppercase tracking-tighter px-1.5 py-0.5 rounded bg-slate-100 text-slate-500 border border-slate-200">
                            {room.type}

    </div>
</div>

 /* จบส่วนจัดการห้อง */

                ) : activeSheet === 'dashboard' ? (() => {
                    const realSeminar = seminar.filter(s=>!isMock(s));

                        const max = Math.max(...Object.values(data),1);

                                        const pct = Math.min(occ/cap,1);
                                        return (
                                            <div key={room.id} className={`p-3 rounded-xl border text-center ${occ>=cap?'bg-rose-50 border-rose-200':occ>0?'bg-amber-50 border-amber-200':'bg-emerald-50 border-emerald-200'}`}>
                                                <div className={`text-sm font-black ${occ>=cap?'text-rose-600':occ>0?'text-amber-600':'text-emerald-600'}`}>{room.roomNo}</div>

                    const rankDisplay = selectedPerson.type === 'guests' && selectedPerson.rank === 'อื่นๆ' ? selectedPerson.rankOther : selectedPerson.rank;

                        .filter(f => cfg.visible[f.key] !== false && (!f.adminOnly || adminProfile));

                    const getVal = (key) => {

                    const FIELD_ICONS = {rank:'award',firstName:'user',lastName:'user',nickname:'smile',region:'map-pin',unitName:'building-2',unit:'building-2',position:'briefcase',origin:'git-branch',batch:'hash',year:'calendar',phone:'phone',lineId:'message-circle',trainingExp:'activity',travelBy:'car',roomTypePref:'home',dietary:'utensils',roomId:'key',disbursement:'receipt',paymentStatus:'credit-card',remarks:'file-text',category:'tag'};

                    <div className="grid grid-cols-2 gap-4">
                        <Field label="Username"><input required className="input-field font-mono" value={adminForm.username} onChange={e => setAdminForm({ ...adminForm, username: e.target.value })} /></Field>
                        <Field label="Password"><input required type="text" className="input-field font-mono" value={adminForm.password} onChange={e => setAdminForm({ ...adminForm, password: e.target.value })} /></Field>
                    </div>
                    <div className="section-box">
                        <h4 className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">สิทธิ์การเข้าถึง</h4>
                        <div className="grid grid-cols-2 gap-3">
                            {Object.keys(ROLES_CONFIG).map(k => (
                                <label key={k} className="flex items-center gap-3 p-3 bg-white rounded-xl border cursor-pointer hover:bg-indigo-50">
                                    <input type="checkbox" className="w-4 h-4 text-indigo-600 rounded" checked={adminForm.roles?.includes(k)} onChange={(e) => { let nr = [...(adminForm.roles || [])]; if (e.target.checked) nr.push(k); else nr = nr.filter(r => r !== k); setAdminForm({ ...adminForm, roles: nr }); }} />
                                    <span className="text-[11px] font-bold text-slate-700">{ROLES_CONFIG[k].label}</span>
                                </label>
                            ))}
                        </div>
                    </div>
                    <button className="w-full py-4 bg-slate-900 text-white rounded-xl font-bold uppercase tracking-widest text-[11px] shadow-lg leading-none">บันทึก</button>
                </form>
            </Modal>

            <Modal title={isEditMode ? "แก้ไขหน่วยงาน" : "เพิ่มหน่วยงานใหม่"} isOpen={isUnitModalOpen} onClose={() => setIsUnitModalOpen(false)}>
                <form onSubmit={saveUnit} className="space-y-6 text-left">
                    <div className="grid grid-cols-2 gap-4">
                        <Field label="รหัสหน่วย"><input required className="input-field font-mono" value={unitForm.id} onChange={e => setUnitForm({ ...unitForm, id: e.target.value })} placeholder="001" disabled={isEditMode} /></Field>
                        <Field label="กองทัพภาค"><select required className="input-field" value={unitForm.region} onChange={e => setUnitForm({ ...unitForm, region: e.target.value })}><option value="">เลือกภาค</option>{REGIONS_LIST.map(r => <option key={r} value={r}>{r}</option>)}</select></Field>
                    </div>
                    <Field label="ชื่อหน่วยงาน"><input required className="input-field" value={unitForm.name} onChange={e => setUnitForm({ ...unitForm, name: e.target.value })} placeholder="ระบุชื่อหน่วย" /></Field>
                    <button className="w-full py-4 bg-slate-900 text-white rounded-xl font-bold uppercase tracking-widest text-[11px] shadow-lg leading-none">บันทึก</button>
                </form>
            </Modal>

            {statusMsg && (
                <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl font-bold text-[10px] uppercase border border-white/10 text-center leading-relaxed max-w-[90vw]">
                    {statusMsg}
                </div>
            )}

            <footer className="p-8 text-center text-[10px] text-slate-300 font-bold uppercase tracking-[0.4em] opacity-40">
                Stable Build 12.2.2 | Military Portal Integration
            </footer>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
