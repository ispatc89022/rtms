<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTMS Log Management v2.2 - React Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
        .glass-table { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; overflow: hidden; }
        .stat-card { background: white; padding: 1.5rem; border-radius: 1.5rem; border: 1px solid #e2e8f0; }
        .input-search { width: 100%; border: 1.5px solid #e2e8f0; padding: 0.6rem 1rem; border-radius: 1rem; outline: none; transition: all 0.2s; }
        .input-search:focus { border-color: #4f46e5; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .btn-main { padding: 0.75rem 1.5rem; border-radius: 1rem; font-weight: 700; font-size: 13px; transition: all 0.2s; text-transform: uppercase; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyClnFib72Jwn2umtlG0fD4jBaE-aG1ceWk",
            authDomain: "rtcdb-66284.firebaseapp.com",
            projectId: "rtcdb-66284",
            appId: "1:800467259752:web:961e90546df3390e2b06dd"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const logCol = db.collection('artifacts/military-system-v12/public/data/checkins');

        const App = () => {
            const [user, setUser] = useState(null);
            const [logs, setLogs] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedIds, setSelectedIds] = useState([]);
            const [loading, setLoading] = useState(false);

            useEffect(() => { return auth.onAuthStateChanged(u => setUser(u)); }, []);

            useEffect(() => {
                if (!user) return;
                // ดึงข้อมูลแบบ Real-time
                const unsubscribe = logCol.orderBy('timestamp', 'desc').onSnapshot(snap => {
                    setLogs(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                return () => unsubscribe();
            }, [user]);

            // ระบบค้นหาอัจฉริยะ (เหมือนหน้าอิมพอร์ต)
            const filteredLogs = useMemo(() => {
                return logs.filter(l => 
                    `${l.name} ${l.unit} ${l.type} ${l.personId}`.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }, [logs, searchTerm]);

            // ระบบสถิติ
            const stats = useMemo(() => {
                return {
                    total: logs.length,
                    seminar: logs.filter(l => l.type === 'ผู้เข้าร่วมสัมมนา').length,
                    others: logs.filter(l => l.type !== 'ผู้เข้าร่วมสัมมนา').length
                };
            }, [logs]);

            // การจัดการลบข้อมูล
            const handleDelete = async (ids) => {
                if (!ids.length || !confirm(`ยืนยันการลบ ${ids.length} รายการ?`)) return;
                setLoading(true);
                try {
                    const batch = db.batch();
                    ids.forEach(id => batch.delete(logCol.doc(id)));
                    await batch.commit();
                    setSelectedIds([]);
                } catch (err) { alert(err.message); }
                setLoading(false);
            };

            const handleClearAll = async () => {
                const pass = prompt("พิมพ์ 'CONFIRM' เพื่อลบข้อมูลทั้งหมดในระบบ:");
                if (pass === 'CONFIRM') {
                    setLoading(true);
                    const snap = await logCol.get();
                    const batch = db.batch();
                    snap.docs.forEach(doc => batch.delete(doc.ref));
                    await batch.commit();
                    setLoading(false);
                }
            };

            const exportCSV = () => {
                const data = logs.map(l => ({
                    "วันเวลา": l.checkInDate,
                    "รหัส": l.personId,
                    "ยศ-ชื่อ-นามสกุล": l.name,
                    "หน่วยงาน": l.unit,
                    "ประเภท": l.type
                }));
                const csv = Papa.unparse(data);
                const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `RTMS_Logs_${new Date().getTime()}.csv`;
                a.click();
            };

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-900 p-6">
                        <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center">
                            <div className="bg-indigo-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                            </div>
                            <h2 className="text-2xl font-black uppercase tracking-tight text-slate-800">Admin Login</h2>
                            <p className="text-xs font-bold text-slate-400 mt-2 uppercase tracking-widest mb-8">Log Management System</p>
                            <button onClick={() => {
                                const e = prompt("Email:"); 
                                const p = prompt("Password:"); 
                                if(e && p) auth.signInWithEmailAndPassword(e,p).catch(a=>alert(a.message));
                            }} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-xl hover:bg-indigo-700 transition-all">Sign In</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20">
                    {/* Header แบบ import3a8 */}
                    <header className="bg-slate-900 px-8 py-5 shadow-2xl sticky top-0 z-50 flex items-center justify-between">
                        <div className="flex items-center gap-4">
                            <div className="bg-indigo-500 p-1.5 rounded-lg font-black text-white italic text-sm">RTMS</div>
                            <h1 className="text-white font-black uppercase tracking-tighter text-lg">Check-in <span className="text-indigo-400">Logs</span></h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <span className="text-[10px] font-black text-slate-500 uppercase hidden md:inline">Admin: {user.email}</span>
                            <button onClick={() => auth.signOut()} className="text-rose-400 text-xs font-black uppercase hover:underline">Logout</button>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-6 mt-10">
                        {/* Stats Row */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                            <div className="stat-card flex justify-between items-center">
                                <span className="text-[11px] font-black text-slate-400 uppercase tracking-widest">Total Checked</span>
                                <span className="text-3xl font-black text-slate-800">{stats.total}</span>
                            </div>
                            <div className="stat-card flex justify-between items-center border-l-4 border-indigo-500">
                                <span className="text-[11px] font-black text-slate-400 uppercase tracking-widest">ผู้สัมมนา</span>
                                <span className="text-3xl font-black text-indigo-600">{stats.seminar}</span>
                            </div>
                            <div className="stat-card flex justify-between items-center border-l-4 border-emerald-500">
                                <span className="text-[11px] font-black text-slate-400 uppercase tracking-widest">กองอำนวยการ/อื่นๆ</span>
                                <span className="text-3xl font-black text-emerald-600">{stats.others}</span>
                            </div>
                        </div>

                        {/* Search & Actions */}
                        <div className="flex flex-col md:flex-row gap-4 mb-6">
                            <div className="flex-1 relative">
                                <input className="input-search pl-12 font-bold text-slate-600" placeholder="ค้นหาตามชื่อ, รหัส หรือหน่วยงาน..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                                <span className="absolute left-4 top-2.5 text-xl">🔍</span>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={exportCSV} className="btn-main bg-emerald-600 text-white shadow-lg hover:bg-emerald-700">Export CSV</button>
                                {selectedIds.length > 0 && <button onClick={() => handleDelete(selectedIds)} className="btn-main bg-rose-500 text-white shadow-lg hover:bg-rose-600">Delete ({selectedIds.length})</button>}
                                <button onClick={handleClearAll} className="btn-main bg-slate-800 text-white shadow-lg hover:bg-slate-700">Wipe Data</button>
                            </div>
                        </div>

                        {/* Table Engine */}
                        <div className="glass-table shadow-sm">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left text-sm">
                                    <thead className="bg-slate-50 border-b text-[12px] font-black text-slate-400 uppercase tracking-widest">
                                        <tr>
                                            <th className="p-5 w-12"><input type="checkbox" className="w-4 h-4 rounded cursor-pointer" onChange={e => setSelectedIds(e.target.checked ? filteredLogs.map(l => l.id) : [])} /></th>
                                            <th className="p-5">วันเวลาเช็คอิน</th>
                                            <th className="p-5">ผู้ลงทะเบียน</th>
                                            <th className="p-5">หน่วยงาน / ต้นสังกัด</th>
                                            <th className="p-5 text-center">ประเภท</th>
                                            <th className="p-5 text-right">การจัดการ</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y font-bold text-slate-700 bg-white">
                                        {filteredLogs.map(l => (
                                            <tr key={l.id} className="hover:bg-indigo-50/50 transition-colors group">
                                                <td className="p-5"><input type="checkbox" className="w-4 h-4 rounded cursor-pointer" checked={selectedIds.includes(l.id)} onChange={() => setSelectedIds(prev => prev.includes(l.id) ? prev.filter(x=>x!==l.id) : [...prev, l.id])} /></td>
                                                <td className="p-5 text-[11px] text-slate-400 font-mono">{l.checkInDate}</td>
                                                <td className="p-5">
                                                    <div className="flex flex-col">
                                                        <span className="text-slate-900 group-hover:text-indigo-600">{l.name}</span>
                                                        <span className="text-[10px] text-slate-400 font-normal">ID: {l.personId}</span>
                                                    </div>
                                                </td>
                                                <td className="p-5 text-xs text-slate-500">{l.unit}</td>
                                                <td className="p-5 text-center">
                                                    <span className={`px-3 py-1 rounded-xl text-[10px] border whitespace-nowrap ${l.type === 'ผู้เข้าร่วมสัมมนา' ? 'bg-indigo-50 text-indigo-600 border-indigo-100' : 'bg-emerald-50 text-emerald-600 border-emerald-100'}`}>
                                                        {l.type}
                                                    </span>
                                                </td>
                                                <td className="p-5 text-right">
                                                    <button onClick={() => handleDelete([l.id])} className="text-slate-300 hover:text-rose-500 transition-colors">🗑️</button>
                                                </td>
                                            </tr>
                                        ))}
                                        {filteredLogs.length === 0 && <tr><td colSpan="6" className="p-20 text-center text-slate-400 italic font-medium">ไม่พบข้อมูลในเงื่อนไขที่ค้นหา</td></tr>}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* Quota Info */}
                        <div className="mt-6 flex justify-between items-center text-[10px] font-black uppercase text-slate-400 tracking-[0.2em]">
                            <span>System Status: <span className="text-emerald-500">Connected</span></span>
                            <span>Firestore Usage: {(logs.length/50000*100).toFixed(4)}% of daily free quota</span>
                        </div>
                    </main>

                    {/* Loading Overlay */}
                    {loading && (
                        <div className="fixed inset-0 bg-white/60 z-[200] flex items-center justify-center font-black animate-pulse text-indigo-600 uppercase text-lg">
                            Processing Data...
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
