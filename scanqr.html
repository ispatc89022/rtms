<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RTMS Check-in Station v1.2.5</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        #reader { width: 100% !important; border: none !important; border-radius: 1.5rem; overflow: hidden; background: #1e293b; position: relative; min-height: 250px; }
        #reader video { object-fit: cover !important; border-radius: 1.5rem; width: 100% !important; height: auto !important; }
        .scan-line { animation: scan 2s linear infinite; height: 2px; background: #6366f1; box-shadow: 0 0 8px #6366f1; z-index: 20; position: absolute; left: 0; right: 0; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-4xl flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-lg shadow-lg">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            </div>
            <div>
                <h1 class="text-xl font-black tracking-tighter">RTMS <span class="text-blue-400">CHECK-IN</span></h1>
                <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">ระบบบันทึกเวลา v1.2.5</p>
            </div>
        </div>
        <button onclick="exportCheckInCSV()" class="bg-green-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase shadow-lg transition-all">
            💾 Export
        </button>
    </header>

    <main class="w-full max-w-4xl grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="space-y-4">
            <div class="bg-gray-800 rounded-3xl p-4 border border-white/5 shadow-2xl">
                <div class="flex flex-col gap-3 mb-4">
                    <select id="camera-select" class="w-full bg-gray-900 text-white text-xs px-4 py-3 rounded-xl border border-white/10 outline-none">
                        <option value="">กรุณากดปุ่มขอสิทธิ์กล้องด้านล่าง</option>
                    </select>
                    <button id="btn-request" onclick="requestPermission()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-xl text-xs font-black uppercase transition-all shadow-xl">
                        1. กดขอสิทธิ์เข้าใช้งานกล้อง
                    </button>
                    <button id="btn-start" onclick="startScanner()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-xl text-xs font-black uppercase transition-all shadow-xl hidden">
                        2. เริ่มการสแกน QR Code
                    </button>
                </div>
                <div id="reader"></div>
            </div>
            
            <div id="status-container" class="text-center p-4 bg-indigo-900 bg-opacity-30 rounded-2xl border border-indigo-500 border-opacity-20">
                <p id="status-text" class="text-indigo-300 font-bold text-xs uppercase tracking-widest">กรุณาดำเนินการตามขั้นตอนด้านบน</p>
            </div>
        </div>

        <div id="result-container" class="space-y-4">
            <div id="result-card" class="bg-white text-gray-900 rounded-3xl p-8 shadow-2xl flex flex-col items-center justify-center text-center hidden h-full min-h-[300px]">
                <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-6">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                </div>
                <h2 id="res-name" class="text-2xl font-black mb-1 text-indigo-900">---</h2>
                <p id="res-unit" class="text-blue-600 font-bold text-sm mb-6">---</p>
                <div class="grid grid-cols-2 gap-4 w-full border-t border-gray-100 pt-6">
                    <div class="text-left">
                        <p class="text-[10px] font-bold text-gray-400 uppercase">ประเภท</p>
                        <p id="res-type" class="font-bold text-sm text-gray-700">-</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-bold text-gray-400 uppercase">เวลาที่สแกน</p>
                        <p id="res-time" class="font-bold text-sm text-green-600">-</p>
                    </div>
                </div>
            </div>

            <div id="standby-card" class="bg-gray-800 bg-opacity-50 rounded-3xl p-8 border-2 border-dashed border-white border-opacity-10 flex flex-col items-center justify-center text-center h-full min-h-[300px]">
                <div class="w-16 h-16 bg-gray-700 rounded-full flex items-center justify-center mb-4 opacity-40">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><rect x="7" y="7" width="3" height="3"></rect><rect x="14" y="7" width="3" height="3"></rect><rect x="7" y="14" width="3" height="3"></rect><rect x="14" y="14" width="3" height="3"></rect></svg>
                </div>
                <p class="text-gray-400 font-bold uppercase tracking-[0.2em] text-[10px]">Ready for Scanning...</p>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyClnFib72Jwn2umtlG0fD4jBaE-aG1ceWk",
            authDomain: "rtcdb-66284.firebaseapp.com",
            projectId: "rtcdb-66284",
            appId: "1:800467259752:web:961e90546df3390e2b06dd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const appId = "military-system-v12";

        let html5Qr;
        let isProcessing = false;

        // ขั้นตอนที่ 1: ขอสิทธิ์
        async function requestPermission() {
            const statusText = document.getElementById('status-text');
            try {
                statusText.innerText = "⏳ กำลังเรียกสิทธิ์การใช้งาน...";
                // บังคับขอสิทธิ์กล้อง
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                // ปิด stream ทันทีเพื่อเตรียมให้ Library ใช้
                stream.getTracks().forEach(track => track.stop());
                
                await getCameras();
                
                document.getElementById('btn-request').classList.add('hidden');
                document.getElementById('btn-start').classList.remove('hidden');
                statusText.innerText = "✅ ได้รับสิทธิ์แล้ว กรุณากดเริ่มสแกน";
            } catch (err) {
                statusText.innerText = "❌ ปฏิเสธสิทธิ์: กรุณาแก้ไขที่ Address Bar";
                console.error(err);
            }
        }

        async function getCameras() {
            const devices = await Html5Qrcode.getCameras();
            const select = document.getElementById('camera-select');
            if (devices && devices.length > 0) {
                select.innerHTML = '';
                devices.forEach((device, index) => {
                    const opt = document.createElement('option');
                    opt.value = device.id;
                    opt.text = device.label || `Camera ${index + 1}`;
                    select.appendChild(opt);
                });
            }
        }

        // ขั้นตอนที่ 2: เริ่มสแกน
        function startScanner() {
            const cameraId = document.getElementById('camera-select').value;
            const statusText = document.getElementById('status-text');
            
            if (html5Qr) { html5Qr.stop().then(() => doStart(cameraId)).catch(() => doStart(cameraId)); }
            else { doStart(cameraId); }
        }

        function doStart(cameraId) {
            html5Qr = new Html5Qrcode("reader");
            html5Qr.start(cameraId, { fps: 15, qrbox: { width: 250, height: 250 } }, onScanSuccess)
            .then(() => {
                document.getElementById('status-text').innerText = "🟢 สแกนเนอร์พร้อมทำงาน";
                document.getElementById('btn-start').innerText = "สลับกล้อง / เริ่มใหม่";
            })
            .catch(err => { document.getElementById('status-text').innerText = `❌ Error: ${err}`; });
        }

        async function onScanSuccess(decodedText) {
            if (isProcessing) return;
            isProcessing = true;
            try {
                let personId = decodedText.includes('?p=') ? decodedText.split('?p=')[1].split('&')[0].toUpperCase() : decodedText.trim().toUpperCase();
                let personData = null;
                let collectionName = '';

                // ค้นหาข้อมูลจาก 9c3
                const semDoc = await db.collection(`artifacts/${appId}/public/data/seminar`).doc(personId).get();
                if (semDoc.exists) { personData = semDoc.data(); collectionName = 'Seminar'; }
                else {
                    const guestDoc = await db.collection(`artifacts/${appId}/public/data/guests`).doc(personId).get();
                    if (guestDoc.exists) { personData = guestDoc.data(); collectionName = personData.category || 'Guest'; }
                }

                if (personData) {
                    const now = new Date();
                    document.getElementById('res-name').innerText = `${personData.rank || ''} ${personData.firstName} ${personData.lastName}`;
                    document.getElementById('res-unit').innerText = personData.unitName || personData.unit || 'ไม่ระบุหน่วย';
                    document.getElementById('res-type').innerText = collectionName;
                    document.getElementById('res-time').innerText = now.toLocaleTimeString('th-TH');

                    document.getElementById('standby-card').classList.add('hidden');
                    document.getElementById('result-card').classList.remove('hidden');

                    await db.collection(`artifacts/${appId}/public/data/checkins`).add({
                        personId: personId,
                        name: `${personData.rank || ''} ${personData.firstName} ${personData.lastName}`,
                        unit: personData.unitName || personData.unit || '-',
                        type: collectionName,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        checkInDate: now.toLocaleString('th-TH')
                    });

                    new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();

                    setTimeout(() => {
                        document.getElementById('result-card').classList.add('hidden');
                        document.getElementById('standby-card').classList.remove('hidden');
                        isProcessing = false;
                    }, 4000);
                } else {
                    alert("ไม่พบรหัส: " + personId);
                    isProcessing = false;
                }
            } catch (error) { isProcessing = false; }
        }

        async function exportCheckInCSV() {
            try {
                const snapshot = await db.collection(`artifacts/${appId}/public/data/checkins`).orderBy('timestamp', 'desc').get();
                if (snapshot.empty) return alert("ไม่มีข้อมูล");
                const data = snapshot.docs.map(doc => ({
                    "รหัส": doc.data().personId,
                    "ชื่อ-นามสกุล": doc.data().name,
                    "หน่วยงาน": doc.data().unit,
                    "ประเภท": doc.data().type,
                    "วันเวลาที่เช็คอิน": doc.data().checkInDate
                }));
                const csv = Papa.unparse(data);
                const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.setAttribute('download', `RTMS_CheckIn_Data.csv`);
                link.click();
            } catch (error) { alert("Error Exporting"); }
        }
    </script>
</body>
</html>
