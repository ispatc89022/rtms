<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyClnFib72Jwn2umtlG0fD4jBaE-aG1ceWk",
            authDomain: "rtcdb-66284.firebaseapp.com",
            projectId: "rtcdb-66284",
            storageBucket: "rtcdb-66284.firebasestorage.app",
            messagingSenderId: "800467259752",
            appId: "1:800467259752:web:961e90546df3390e2b06dd"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Collections
        const seminarCol = db.collection('artifacts/military-system-v12/public/data/seminar');
        const guestsCol = db.collection('artifacts/military-system-v12/public/data/guests');
        const roomsCol = db.collection('artifacts/military-system-v12/public/data/rooms');
        const adminsCol = db.collection('artifacts/military-system-v12/public/data/admins');

// ✅ เลือกใช้ชุดนี้ชุดเดียวพอครับ (วางไว้นอก App)
const getPersonUrl = (p) => {
    if (!p || !p.id) return "";
    return `${window.location.origin}${window.location.pathname}?id=${p.id}`;
};

const QRCodeDisplay = ({ url, size = 160 }) => {
    const qrRef = React.useRef(null);
    React.useEffect(() => {
        if (qrRef.current && url && typeof QRCode !== 'undefined') {
            qrRef.current.innerHTML = "";
            new QRCode(qrRef.current, {
                text: url, width: size, height: size,
                colorDark: "#1e293b", colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }
    }, [url, size]);
    return (
        <div className="qr-container p-2 bg-white rounded-xl shadow-inner border border-slate-100 flex items-center justify-center">
            {typeof QRCode === 'undefined' ? <div className="text-[10px]">Loading...</div> : <div ref={qrRef}></div>}
        </div>
    );
};

        const App = () => {
            const [adminProfile, setAdminProfile] = useState(null);
            const [loginForm, setLoginForm] = useState({ user: '', pass: '' });
            const [mode, setMode] = useState('guest'); 
            const [adminSubTab, setAdminSubTab] = useState('requests'); 
            const [list, setList] = useState([]);
            const [rooms, setRooms] = useState([]);
            const [guests, setGuests] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [accSearchTerm, setAccSearchTerm] = useState(''); // เพิ่มสำหรับจัดการที่พัก
            const [accRoomSearchTerm, setAccRoomSearchTerm] = useState('');
            const [selectedIds, setSelectedIds] = useState([]);
            const [tableSearchTerm, setTableSearchTerm] = useState('');
            const [isConfirming, setIsConfirming] = useState(false);
            const [staffSearchTerm, setStaffSearchTerm] = useState('');
            const [isGuestModalOpen, setIsGuestModalOpen] = useState(false);
            const [selectedPerson, setSelectedPerson] = useState(null);
            const [isFullscreenQrOpen, setIsFullscreenQrOpen] = useState(false); // สำหรับขยาย QR
            const [isEditMode, setIsEditMode] = useState(false);
            const [currentEditItem, setCurrentEditItem] = useState(null);
            const [guestForm, setGuestForm] = useState({ rank: '', rankOther: '', firstName: '', lastName: '', nickname: '', position: '', category: 'กองอำนวยการ', phone: '', roomId: '', unit: ''});

            const SEMINAR_FIELD_DEFS = [
                { key: 'seminarYear', label: 'ปีสัมมนา' }, // เพิ่มใหม่ถ้าต้องการโชว์ปี
                { key: 'seminarPeriod', label: 'ผลัดที่' }, // ✅ เพิ่มบรรทัดนี้
                { key: 'rank', label: 'ยศ' },
                { key: 'firstName', label: 'ชื่อ' },
                { key: 'lastName', label: 'นามสกุล' },
                { key: 'nickname', label: 'ชื่อเล่น' },
                { key: 'unitName', label: 'หน่วยงาน' },
                { key: 'phone', label: 'เบอร์โทรศัพท์' },
                { key: 'roomId', label: 'ห้องพัก' },
                { key: 'category', label: 'ประเภท' }
            ];

            const ROLES_CONFIG = {
    'SUPER_ADMIN': { label: 'Super Admin', color: 'bg-rose-500 text-white' },
    'ADMIN': { label: 'Admin', color: 'bg-indigo-600 text-white' },
    'EDITOR': { label: 'Editor', color: 'bg-amber-500 text-white' },
    'VIEWER': { label: 'Viewer', color: 'bg-slate-500 text-white' }
};

const GUEST_FIELD_DEFS = [
    { key: 'rank', label: 'ยศ' },
    { key: 'firstName', label: 'ชื่อ' },
    { key: 'lastName', label: 'นามสกุล' },
    { key: 'position', label: 'ตำแหน่ง' },
    { key: 'unit', label: 'หน่วยงาน' },
    { key: 'phone', label: 'เบอร์โทรศัพท์' },
    { key: 'roomId', label: 'ห้องพัก' }
];

// Config การแสดงผล
const dispCfg = {
    seminar: { visible: {}, order: ['rank', 'firstName', 'lastName', 'nickname', 'unitName', 'phone', 'roomId'] },
    guest: { visible: {}, order: ['rank', 'firstName', 'lastName', 'position', 'unit', 'phone', 'roomId'] }
};

const exportToCSV = () => {
        const headers = ["ลำดับ", "ห้องที่", "หน่วย", "ยศ", "ชื่อ", "สกุล", "เบอร์มือถือ", "ลงชื่อ"];
        const allData = [...list, ...guests];
        const rows = allData.map((item, idx) => [
            idx + 1,
            item.roomId || '',
            item.unitName || item.unit || '',
            item.rank === 'อื่นๆ' ? (item.rankOther || '') : (item.rank || ''),
            item.firstName || '', item.lastName || '',
            item.phone ? `'${item.phone}` : '', ''
        ]);
        const csvContent = [headers, ...rows].map(e => e.join(",")).join("\n");
        const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `RTMS_Export_${new Date().toLocaleDateString()}.csv`;
        link.click();
    };

    const printReport = () => {
        const w = window.open('', '_blank');
        const allData = [...list, ...guests];
        const tableRows = allData.map((item, idx) => `
            <tr>
                <td style="text-align:center;">${idx + 1}</td>
                <td style="text-align:center;">${item.roomId || '-'}</td>
                <td>${item.unitName || item.unit || '-'}</td>
                <td>${item.rank === 'อื่นๆ' ? item.rankOther : item.rank}</td>
                <td>${item.firstName}</td><td>${item.lastName}</td>
                <td>${item.phone || '-'}</td><td></td>
            </tr>`).join('');
        w.document.write(`<html><head><style>@import url('https://fonts.googleapis.com/css2?family=Sarabun&display=swap'); table{width:100%; border-collapse:collapse; font-family:'Sarabun';} th,td{border:1px solid black; padding:8px; font-size:14px;}</style></head><body><h2 style="text-align:center">บัญชีรายชื่อจัดที่พัก RTMS</h2><table><thead><tr><th>ลำดับ</th><th>ห้องที่</th><th>หน่วย</th><th>ยศ</th><th>ชื่อ</th><th>สกุล</th><th>เบอร์โทร</th><th>ลงชื่อ</th></tr></thead><tbody>${tableRows}</tbody></table><script>window.onload=()=>{window.print();window.close();}<\/script></body></html>`);
        w.document.close();
    };

            const handleRejectPair = async (pair) => {
                if (!confirm("ยืนยันการปฏิเสธคำร้องจับคู่นี้?")) return;
                const batch = db.batch();
                // คืนสถานะให้ทั้งคนส่ง (p1) และคนรับ (p2)
                [pair.p1, pair.p2].forEach(p => {
                    batch.update(seminarCol.doc(p.docId), { 
                        roomStatus: 'ปกติ', 
                        pendingPairWith: null 
                    });
                });
                await batch.commit();
                alert("❌ ปฏิเสธคำร้องและคืนสถานะปกติเรียบร้อย");
            };

// ✅ ฟังก์ชันสำหรับกดบันทึกใน Modal
const handleSaveGuest = async (e) => {
    e.preventDefault();
    try {
        if (isEditMode && currentEditItem) {
            // แก้ไขข้อมูลเดิม
            await guestsCol.doc(currentEditItem.docId).update(guestForm);
            alert("✅ อัปเดตข้อมูลสำเร็จ");
        } else {
            // เพิ่มรายชื่อใหม่
            await guestsCol.add({
                ...guestForm,
                id: `G-${Date.now().toString().slice(-4)}`, // สร้าง ID จำลอง
                createdAt: new Date().toISOString()
            });
            alert("✅ เพิ่มรายชื่อสำเร็จ");
        }
        setIsGuestModalOpen(false); // ปิดหน้าต่าง
    } catch (error) {
        console.error("Error:", error);
        alert("❌ เกิดข้อผิดพลาดในการบันทึก");
    }
};



// ✅ วางฟังก์ชันรับจอง (Reserve) ต่อตรงนี้เลยเพื่อน
const handleReservePair = async (pair) => {
    if (!confirm("ยืนยันการรับจองคู่พักนี้? (สถานะจะเปลี่ยนเป็นอนุมัติเพื่อจัดห้องภายหลัง)")) return;
    
    // สร้างรหัสการจองแบบสุ่ม BK-XXXX
    const bookingId = `BK-${Math.floor(1000 + Math.random() * 9000)}`;
    const batch = db.batch();
    
    [pair.p1, pair.p2].forEach(p => {
        batch.update(seminarCol.doc(p.docId), { 
            roomStatus: 'อนุมัติแล้ว', 
            roomId: bookingId,        
            pendingPairWith: null 
        });
    });
    
    await batch.commit();
    alert(`✅ รับจองสำเร็จ! รหัสอ้างอิง: ${bookingId}\nคุณสามารถนำรหัสนี้ไปค้นหาเพื่อใส่เลขห้องจริงได้ในหน้าจัดการห้อง`);
};

            useEffect(() => {
                const saved = localStorage.getItem('rtms_admin_session');
                if (saved) setAdminProfile(JSON.parse(saved));
                
                const unsubS = seminarCol.onSnapshot(s => setList(s.docs.map(d => ({docId: d.id, ...d.data()}))));
                const unsubR = roomsCol.onSnapshot(s => setRooms(s.docs.map(d => ({docId: d.id, ...d.data()}))));
                const unsubG = guestsCol.onSnapshot(s => setGuests(s.docs.map(d => ({docId: d.id, ...d.data()}))));
                return () => { unsubS(); unsubR(); unsubG(); };
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                const snap = await adminsCol.where('username', '==', loginForm.user).where('password', '==', loginForm.pass).get();
                if (!snap.empty) {
                    const data = { id: snap.docs[0].id, ...snap.docs[0].data() };
                    setAdminProfile(data);
                    localStorage.setItem('rtms_admin_session', JSON.stringify(data));
                    setMode('admin');
                } else {
                    alert("❌ Username หรือ Password ไม่ถูกต้อง");
                }
            };

            const assignRoom = async (personDocId, roomNo, type = 'seminar') => {
                const col = type === 'guests' ? guestsCol : seminarCol;
                await col.doc(personDocId).update({ 
                    roomId: roomNo, 
                    roomStatus: roomNo ? 'อนุมัติแล้ว' : 'ปกติ' 
                });
            };

            const pendingPairs = useMemo(() => {
                const pairs = [];
                const seen = new Set();
                list.filter(p => p.roomStatus === 'รออนุมัติ' && p.pendingPairWith).forEach(p => {
                    if (seen.has(p.docId)) return;
                    const partner = list.find(pt => pt.docId === p.pendingPairWith);
                    if (partner) {
                        pairs.push({ p1: p, p2: partner });
                        seen.add(p.docId); seen.add(partner.docId);
                    }
                });
                return pairs;
            }, [list]);

            const handleApprovePairWithRoom = async (pair, roomNo) => {
                if (!roomNo) return;
                const batch = db.batch();
                [pair.p1, pair.p2].forEach(p => {
                    batch.update(seminarCol.doc(p.docId), { 
                        roomStatus: 'อนุมัติแล้ว', 
                        roomId: roomNo, 
                        pendingPairWith: null 
                    });
                });
                await batch.commit();
            };

            // --- Guest Logic ---
            const handleSelect = (person) => {
                if (selectedIds.includes(person.docId)) {
                    setSelectedIds(selectedIds.filter(id => id !== person.docId));
                    return;
                }
                if (person.roomTypePref === 'พักเดี่ยว') {
                    alert("⚠️ คุณยื่นขอที่พักเดี่ยวไว้ในระบบแล้ว");
                    return;
                }
                if (selectedIds.length < 2) setSelectedIds([...selectedIds, person.docId]);
            };

            const submitPairing = async () => {
                const batch = db.batch();
                selectedIds.forEach((id, idx) => {
                    const partnerId = selectedIds[idx === 0 ? 1 : 0];
                    batch.update(seminarCol.doc(id), { roomStatus: 'รออนุมัติ', pendingPairWith: partnerId });
                });
                await batch.commit();
                setSelectedIds([]); setIsConfirming(false);
                alert("✅ ส่งคำร้องขอจับคู่สำเร็จ");
            };

            const filteredList = list.filter(i => 
                `${i.firstName} ${i.lastName} ${i.unitName} ${i.id}`.toLowerCase().includes(searchTerm.toLowerCase())
            ).sort((a, b) => (a.id > b.id ? 1 : -1));

            return (
                <div className="min-h-screen flex flex-col">
<header className="bg-slate-900 text-white sticky top-0 z-[60] shadow-xl border-b border-white/10">
    {/* แถวบน: Logo และข้อมูล Admin */}
    <div className="flex justify-between items-center px-4 py-3 bg-gradient-to-b from-slate-900 to-slate-800">
        {/* ฝั่งซ้าย: Logo และชื่อหน่วยงาน */}
        <div className="flex items-center gap-3 overflow-hidden cursor-pointer" onClick={() => setMode('guest')}>
            <div className="shrink-0">
                <img 
                    src="logoatcbgclr.png" 
                    alt="Office of Training Logo" 
                    className="w-10 h-10 md:w-12 md:h-12 object-contain drop-shadow-md" 
                />
            </div>
            <div className="flex flex-col leading-tight min-w-0 text-left">
                <h1 className="text-base md:text-xl font-black uppercase tracking-tighter text-white">
                    RTMS <span className="text-[10px] font-bold text-indigo-400 align-top">V12.2</span>
                </h1>
                <p className="text-[9px] md:text-[11px] font-bold text-slate-300 truncate tracking-tight">

                </p>
            </div>
        </div>

        {/* ฝั่งขวา: Admin Profile & Login/Logout */}
        <div className="flex items-center gap-3">
    {adminProfile && mode === 'admin' && (
        <div className="flex flex-col items-end mr-1 text-right">
            <div className="flex items-center gap-1.5">
                <div className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
                <span className="text-[10px] font-bold text-indigo-300 whitespace-nowrap leading-none">

                    {adminProfile.name || adminProfile.username || 'Admin'}
                </span>
            </div>
            
            {/* แสดง Badge แยกตามสิทธิ์ */}
            <div className="flex gap-1 mt-1">
                {(adminProfile.roles || ['ADMIN']).map((r) => (
                    <span

                    >
                        {ROLES_CONFIG[r]?.label || r}
                    </span>
                ))}
            </div>
        </div>
    )}
    
    <div className="flex items-center bg-white/5 p-1 rounded-xl border border-white/10">
        {adminProfile && mode === 'admin' ? (
            <button onClick={() => { if(confirm('ต้องการออกจากระบบ?')) { localStorage.removeItem('rtms_admin_session'); setAdminProfile(null); setMode('guest'); } }} 
                className="flex items-center gap-2 p-2 bg-rose-500/20 text-rose-400 rounded-lg hover:bg-rose-500 hover:text-white transition-all">
                <span className="text-[10px] font-bold uppercase whitespace-nowrap px-1 text-[14px]">✕</span>
            </button>
        ) : (
            <button onClick={() => setMode('admin')} 
                className="flex items-center gap-2 p-2 bg-indigo-600 text-white rounded-lg px-4 py-2 hover:bg-indigo-500 transition-all">
                <span className="text-[10px] font-bold uppercase whitespace-nowrap">Log in</span>
            </button>
        )}
    </div>
</div>
    </div>

    {/* แถวล่าง: เมนูหลัก (ปรับให้ใช้กับ room01b) */}
    <nav className="bg-slate-900 px-2 py-2 flex items-center justify-center gap-2 overflow-x-auto no-scrollbar border-t border-white/5">
        <button onClick={() => setMode('guest')}

            <span className="text-[10px] font-black uppercase tracking-tighter">🏠 จับคู่ที่พัก</span>
        </button>

        {adminProfile && (
            <button onClick={() => { setMode('admin'); setAdminSubTab('requests'); }}

                <span className="text-[10px] font-black uppercase tracking-tighter">⚙️ แอดมิน</span>
            </button>
        )}
    </nav>
</header>

                    <main className="p-6 max-w-[1600px] mx-auto w-full flex-1">
                        {mode === 'admin' && !adminProfile ? (
                            <div className="flex items-center justify-center py-20">
                                <form onSubmit={handleLogin} className="bg-white p-10 rounded-[3rem] w-full max-w-sm shadow-2xl border-t-8 border-indigo-600 font-bold">
                                    <h2 className="text-2xl font-black text-center mb-8 uppercase">Admin Login</h2>
                                    <div className="space-y-4">
                                        <input className="input-box" placeholder="Username" onChange={e => setLoginForm({...loginForm, user: e.target.value})} required />
                                        <input className="input-box" type="password" placeholder="Password" onChange={e => setLoginForm({...loginForm, pass: e.target.value})} required />
                                        <button className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg hover:bg-indigo-700 transition-all">เข้าสู่ระบบ</button>

                                </form>

                        ) : mode === 'admin' ? (
                            <div className="space-y-6">
                                {/* Sub Menu แอดมิน */}
<div className="flex flex-col lg:flex-row justify-between items-start lg:items-center border-b border-slate-200 mb-8 gap-4 pb-1">

        {[

                                        <div className="text-left">
                                            <div className="text-[10px] font-black text-indigo-400 uppercase tracking-widest">{isStaff ? 'กองอำนวยการ' : 'ผู้เข้าร่วมสัมมนา'}</div>
                                            <h3 className="text-xl font-black text-slate-800">{rankDisplay}{p.firstName} {p.lastName}</h3>
                                            {p.nickname && <span className="text-sm text-indigo-500 font-bold">({p.nickname})</span>}
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 gap-3 text-left">
                                        {fieldDefs.filter(f => !['rank', 'firstName', 'lastName', 'nickname'].includes(f.key)).map(f => {
                                            const val = f.key === 'roomId' ? (p.roomId ? `ห้อง ${p.roomId}` : 'ยังไม่จัดห้อง') : p[f.key];
                                            if (!val || val === '-') return null;
                                            return (
                                                <div key={f.key} className="flex items-center gap-3 text-xs">
                                                    <span className="text-slate-400 font-bold w-24 shrink-0">{f.label}:</span>
                                                    <span className={`font-black ${f.key === 'roomId' ? 'text-rose-600' : 'text-slate-700'}`}>{val}</span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

{/* --- ส่วนแสดง QR Code ใน Modal (ตอนนี้ใช้ได้แล้ว) --- */}
<div className="flex flex-col items-center justify-center bg-white border border-slate-200 rounded-[2rem] p-4 sm:w-[200px] shrink-0">
    <div className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1 text-center">Registration ID</div>
    <div className="text-lg font-black text-indigo-600 mb-2">{p.id}</div>
    
    {/* ✅ เรียกใช้ผ่าน Component ที่เราใส่ตัวกันจอขาวไว้แล้ว */}
    <QRCodeDisplay url={getPersonUrl(p)} size={140} />
    
    <div className="text-[8px] font-bold text-slate-400 text-center mt-2 uppercase tracking-tighter">
        Scan for Profile
    </div>
</div>
                            </div>

                            {/* ปุ่มจัดการด้านล่าง */}
                            <div className="flex gap-3">
                                <button 
                                    onClick={() => setSelectedPerson(null)}
                                    className="flex-1 py-4 bg-slate-100 text-slate-400 rounded-2xl font-black uppercase text-[10px] tracking-widest hover:bg-rose-50 hover:text-rose-500 transition-all"
                                >
                                    ปิดหน้าต่าง
                                </button>
                            </div>
                        </div>
                    );
                })()}
            </div>
        </div>
    </div>
)}                    

{/* ✅ ส่วนแสดงหน้ากากกรอกข้อมูล (Modal) */}
{isGuestModalOpen && (
    <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[150] flex items-center justify-center p-4">
        <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-lg overflow-hidden animate-in zoom-in duration-300">
            <div className="p-6 bg-slate-50 border-b flex justify-between items-center font-bold">
                <h3 className="uppercase text-slate-800">{isEditMode ? '📝 แก้ไขรายชื่อ' : '➕ เพิ่มรายชื่อใหม่'}</h3>
                <button onClick={() => setIsGuestModalOpen(false)} className="text-slate-400 hover:text-rose-500 text-2xl">✕</button>
            </div>
            <form onSubmit={handleSaveGuest} className="p-8 space-y-4 max-h-[75vh] overflow-y-auto no-scrollbar text-left font-bold">
                <div className="grid grid-cols-2 gap-4">
                    <div>
                        <label className="text-[10px] font-black uppercase text-slate-400 ml-1">ยศ</label>
                        <select className="input-box" value={guestForm.rank} onChange={e => setGuestForm({...guestForm, rank: e.target.value})} required>
                            <option value="">-- เลือกยศ --</option>
                            <option value="พล.อ.">พล.อ.</option><option value="พล.ท.">พล.ท.</option><option value="พล.ต.">พล.ต.</option>
                            <option value="พ.อ.">พ.อ.</option><option value="พ.ท.">พ.ท.</option><option value="พ.ต.">พ.ต.</option>
                            <option value="ร.อ.">ร.อ.</option><option value="ร.ท.">ร.ท.</option><option value="ร.ต.">ร.ต.</option>
                            <option value="อื่นๆ">อื่นๆ (ระบุเอง)</option>
                        </select>
                    </div>
                    {guestForm.rank === 'อื่นๆ' && (
                        <div>
                            <label className="text-[10px] font-black uppercase text-slate-400 ml-1">ระบุยศเอง</label>
                            <input className="input-box" value={guestForm.rankOther} onChange={e => setGuestForm({...guestForm, rankOther: e.target.value})} placeholder="เช่น นาย, ศ." required />
                        </div>
                    )}
                </div>
                <div className="grid grid-cols-2 gap-4">
                    <input className="input-box" placeholder="ชื่อ" value={guestForm.firstName} onChange={e => setGuestForm({...guestForm, firstName: e.target.value})} required />
                    <input className="input-box" placeholder="นามสกุล" value={guestForm.lastName} onChange={e => setGuestForm({...guestForm, lastName: e.target.value})} required />
                </div>
                <div className="grid grid-cols-2 gap-4">
                    <input className="input-box" placeholder="ชื่อเล่น" value={guestForm.nickname} onChange={e => setGuestForm({...guestForm, nickname: e.target.value})} />
                    <input className="input-box" placeholder="เบอร์โทร" value={guestForm.phone} onChange={e => setGuestForm({...guestForm, phone: e.target.value})} />
                </div>
                <input className="input-box" placeholder="ตำแหน่ง" value={guestForm.position} onChange={e => setGuestForm({...guestForm, position: e.target.value})} />
                <input className="input-box" placeholder="หน่วยงาน" value={guestForm.unit} onChange={e => setGuestForm({...guestForm, unit: e.target.value})} />
                <select className="input-box" value={guestForm.category} onChange={e => setGuestForm({...guestForm, category: e.target.value})}>
                    <option value="กองอำนวยการ">กองอำนวยการ</option>
                    <option value="วิทยากร">วิทยากร</option>
                </select>
                <div className="pt-4 flex gap-3">
                    <button type="submit" className="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg hover:bg-indigo-700">บันทึก</button>
                    <button type="button" onClick={() => setIsGuestModalOpen(false)} className="flex-1 bg-slate-100 text-slate-400 py-4 rounded-2xl font-black uppercase">ยกเลิก</button>
                </div>
            </form>
        </div>
    </div>
)}
                
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
