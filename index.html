<html lang="th">

        window.FirebaseSDK = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, collection, doc, setDoc, onSnapshot, writeBatch, deleteDoc, updateDoc, addDoc };
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; color: #1e293b; text-align: left; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .input-field { width: 100%; padding: 0.75rem 0.85rem; background: white; border: 1.5px solid #e2e8f0; border-radius: 0.75rem; font-weight: 600; outline: none; transition: all 0.2s; }
        .input-field:focus { border-color: #4f46e5; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .tab-active { background-color: #4f46e5; color: white; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); }

        .section-title { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem; border-left: 4px solid #4f46e5; padding-left: 10px; }
        .btn-filter { padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.75rem; font-weight: 700; transition: all 0.2s; border: 1px solid #e2e8f0; background: white; color: #64748b; }
        .btn-filter.active { background: #4f46e5; color: white; border-color: #4f46e5; }
        .subtab-active { border-bottom: 3px solid #4f46e5; color: #4f46e5; font-weight: 800; }
        .role-tag { font-size: 8px; font-weight: 800; padding: 2px 5px; border-radius: 4px; text-transform: uppercase; margin-right: 2px; display: inline-block; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, collection, doc, setDoc, onSnapshot, writeBatch, deleteDoc, updateDoc, addDoc } = window.FirebaseSDK;

        // --- 1. FIREBASE CONFIG ---
        const firebaseConfig = { 
            apiKey: "AIzaSyClnFib72Jwn2umtlG0fD4jBaE-aG1ceWk", 
            authDomain: "rtcdb-66284.firebaseapp.com", 
            projectId: "rtcdb-66284", 
            storageBucket: "rtcdb-66284.firebasestorage.app", 
            messagingSenderId: "800467259752", 
            appId: "1:800467259752:web:961e90546df3390e2b06dd" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "military-system-v12";
        const SHEET_ID = "1U4dq5m8MbwyYgfgN_zhTWJEDAjIfR3DA6h5H2YEQdGU";

        // --- 2. CONSTANTS ---
        const RANKS = ['พล.อ.', 'พล.ท.', 'พล.ต.', 'พ.อ. (พิเศษ)', 'พ.อ.', 'พ.ท.', 'พ.ต.', 'ร.อ.', 'ร.ท.', 'ร.ต.', 'จ.ส.อ. (พิเศษ)', 'จ.ส.อ.', 'จ.ส.ท.', 'จ.ส.ต.', 'ส.อ.', 'ส.ท.', 'ส.ต.'];
        const GUEST_RANKS = [...RANKS, 'อื่นๆ']; // เพิ่ม อื่นๆ สำหรับกองอำนวยการ
        const REGIONS_LIST = ['ทภ.1', 'ทภ.2', 'ทภ.3', 'ทภ.4', 'นขต.ทบ.'];
        const ORIGINS = ['นตท.', 'นนส.', 'อื่นๆ'];
        const TRAINING_EXP = ['ไม่เคยฝึก', '1-2 ผลัด', '3-4 ผลัด', 'มากกว่า 4 ผลัด'];
        const TRAVEL_METHODS = ['รถรวม', 'รถส่วนตัว'];
        const ROOM_TYPES = ['พักรวม', 'พักเดี่ยว'];
        const ROOM_STATUSES = ['ว่าง', 'ไม่ครบคู่', 'รับห้องแล้ว', 'คืนห้องแล้ว', 'VIP', 'อื่นๆ'];
        const DIETARY_RESTRICTIONS = ['ไม่มีข้อจำกัดด้านอาหาร', 'อาหารอิสลาม', 'มังสวิรัติ', 'แพ้อาหารทะเล'];
        const CATEGORIES = ['กองอำนวยการ', 'ผู้บังคับบัญชา', 'วิทยากร', 'อื่นๆ'];
        
        const ROLES_CONFIG = {
            SUPER_ADMIN: { label: 'ทั้งหมด', color: 'bg-rose-500 text-white' },
            SEMINAR: { label: 'สัมมนา', color: 'bg-indigo-500 text-white' },
            ACCOMMODATION: { label: 'จัดการที่พัก', color: 'bg-emerald-500 text-white' },
            UNITS: { label: 'ฐานข้อมูลหน่วย', color: 'bg-amber-500 text-white' },
            VIEWER: { label: 'ดูได้อย่างเดียว', color: 'bg-slate-400 text-white' }
        };

        const INITIAL_SEMINAR_FORM = {
            region: '', unitName: '', rank: '', firstName: '', lastName: '', nickname: '', 
            phone: '', lineId: '', position: '', origin: '', originOther: '', batch: '', year: '', 
            npBatch: '', npYear: '', trainingExp: 'ไม่เคยฝึก', travelBy: 'รถรวม', 
            roomTypePref: 'พักรวม', dietary: 'ไม่มีข้อจำกัดด้านอาหาร', remarks: '', 
            disbursement: 'เบิกไม่ได้', roomId: '', paymentStatus: 'ยังไม่จ่าย'
        };

        const MOCK_NAMES = ["สมชาย", "วิชัย", "ธนพล", "เอกชัย", "สุรศักดิ์", "ณัฐวุฒิ", "กิตติพงษ์", "อรรถพล", "ศักดิ์ชัย", "ธีรภัทร"];
        const MOCK_LASTNAMES = ["ใจกล้า", "มั่นคง", "รักเกียรติ", "พิชิตชัย", "เก่งกาจ", "พิทักษ์ไทย", "องอาจ", "ชาติทหาร", "ยอดเยี่ยม", "เข้มแข็ง"];

        // --- Helper Function: Google Sheet Timestamp Format ---
        const getGSheetTimestamp = () => {
            const d = new Date();
            const pad = (n) => n.toString().padStart(2, '0');
            return `${pad(d.getDate())}/${pad(d.getMonth() + 1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
        };

        // --- 3. UI COMPONENTS ---
        const Icon = ({ name, size = 16, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" style="width: ${size}px; height: ${size}px;"></i>`;
                    window.lucide.createIcons({ root: iconRef.current });
                }
            }, [name, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        const Field = ({ label, children }) => (
            <div className="space-y-1 text-left">
                <label className="text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-wider">{label}</label>
                {children}
            </div>
        );

        const Modal = ({ title, isOpen, onClose, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col animate-in zoom-in duration-200">
                        <div className="p-6 border-b flex justify-between items-center bg-slate-50">
                            <h3 className="text-lg font-bold text-slate-800 uppercase leading-none">{title}</h3>
                            <button onClick={onClose} className="p-2 hover:bg-slate-200 rounded-full transition-colors">
                                <Icon name="x" size={20} className="text-slate-500" />
                            </button>
                        </div>
                        <div className="p-6 overflow-y-auto no-scrollbar">{children}</div>
                    </div>
                </div>
            );
        };

        // --- 4. MAIN APPLICATION ---
        const App = () => {
            const [adminProfile, setAdminProfile] = useState(null);
            const [activeSheet, setActiveSheet] = useState('seminar');
            const [accSubTab, setAccSubTab] = useState('manage');
            const [adminSubTab, setAdminSubTab] = useState('users');
            
            const [seminar, setSeminar] = useState([]);
            const [guests, setGuests] = useState([]);
            const [rooms, setRooms] = useState([]);
            const [units, setUnits] = useState([]);
            const [admins, setAdmins] = useState([]);
            const [logs, setLogs] = useState([]);
            
            const [searchTerm, setSearchTerm] = useState('');
            const [accSearchTerm, setAccSearchTerm] = useState(''); 
            const [accRoomSearchTerm, setAccRoomSearchTerm] = useState(''); 
            const [unitSearchTerm, setUnitSearchTerm] = useState('');
            const [unitRegionFilter, setUnitRegionFilter] = useState('All');
            const [statusMsg, setStatusMsg] = useState('');
            const [isLoginView, setIsLoginView] = useState(false);
            const [loginForm, setLoginForm] = useState({ username: '', password: '' });
            const [loginError, setLoginError] = useState('');
            const [isDataLoaded, setIsDataLoaded] = useState(false);

            // Time state for the sub-header
            const [currentTime, setCurrentTime] = useState(new Date());

            const isSeedingRef = useRef(false);
            
            // File input refs for CSV Import
            const importSeminarRef = useRef(null);
            const importGuestRef = useRef(null);
            const importUnitRef = useRef(null);
            const importRoomRef = useRef(null);

            const [isSeminarModalOpen, setIsSeminarModalOpen] = useState(false);
            const [isGuestModalOpen, setIsGuestModalOpen] = useState(false);
            const [isAdminModalOpen, setIsAdminModalOpen] = useState(false);
            const [isUnitModalOpen, setIsUnitModalOpen] = useState(false);
            const [isRoomModalOpen, setIsRoomModalOpen] = useState(false);
            const [isChangelogOpen, setIsChangelogOpen] = useState(false); 
            const [isEditMode, setIsEditMode] = useState(false);
            const [currentEditItem, setCurrentEditItem] = useState(null);
            
            const [seminarForm, setSeminarForm] = useState(INITIAL_SEMINAR_FORM);
            const [guestForm, setGuestForm] = useState({ rank: '', rankOther: '', firstName: '', lastName: '', nickname: '', position: '', category: 'กองอำนวยการ', phone: '', roomId: '', unit: '' });
            const [adminForm, setAdminForm] = useState({ name: '', username: '', password: '', roles: ['VIEWER'] });
            const [unitForm, setUnitForm] = useState({ id: '', region: 'ทภ.1', name: '' });
            const [roomForm, setRoomForm] = useState({ roomNo: '', type: 'พักรวม', status: 'ว่าง', statusOther: '' });

            const showStatus = (msg) => { setStatusMsg(msg); setTimeout(() => setStatusMsg(''), 4000); };

            const logAction = async (action, details = "") => {
                if (!db || !adminProfile) return;
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'logs'), {
                        timestamp: new Date(),
                        userId: adminProfile.username, userName: adminProfile.name, action, details
                    });
                } catch(e) {}
            };

            const hasPermission = (module) => {
                if (!adminProfile) return false;
                if (adminProfile.roles?.includes('SUPER_ADMIN')) return true;
                return adminProfile.roles?.includes(module);
            };

            const maskPhoneNumber = (phone) => {
                if (!phone || phone.length < 9) return phone;
                const p = phone.replace(/\D/g, ''); 
                if (p.length < 9) return phone;
                return `${p.substring(0, 3)}-XXX-${p.substring(p.length - 4)}`;
            };

            const formatPhone = (phone) => {
                if (!phone) return '-';
                const p = phone.replace(/\D/g, ''); 
                if (p.length !== 10) return phone;
                return `${p.substring(0, 3)}-${p.substring(3, 6)}-${p.substring(6)}`;
            };

            // Process CSV Logic
            const processCSVText = async (text, collectionName) => {
                if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
                const rows = [];
                let row = [];
                let inQuotes = false;
                let val = '';
                for (let i = 0; i < text.length; i++) {
                    let char = text[i];
                    let nextChar = text[i+1];
                    if (char === '"' && inQuotes && nextChar === '"') {
                        val += '"'; i++;
                    } else if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        row.push(val); val = '';
                    } else if ((char === '\n' || char === '\r') && !inQuotes) {
                        if (char === '\r' && nextChar === '\n') i++; 
                        row.push(val); rows.push(row); row = []; val = '';
                    } else {
                        val += char;
                    }
                }
                if (val || row.length > 0) { row.push(val); rows.push(row); }
                
                if (rows.length < 2) return showStatus("ไฟล์ CSV ไม่มีข้อมูลเพียงพอ");
                
                const headers = rows[0].map(h => h.trim());
                let count = 0;
                let batch = writeBatch(db);
                let operations = 0;

                for (let i = 1; i < rows.length; i++) {
                    if (rows[i].length === 0 || (rows[i].length === 1 && !rows[i][0])) continue;
                    const data = {};
                    let hasData = false;
                    headers.forEach((h, index) => {
                        let cellValue = rows[i][index];
                        if (cellValue !== undefined && h) {
                            data[h] = cellValue;
                            hasData = true;
                        }
                    });
                    
                    if (hasData) {
                        const docId = data.id || data.docId || `${collectionName.charAt(0).toUpperCase()}I${Date.now()}_${i}`;
                        delete data.id;
                        delete data.docId;
                        
                        batch.set(doc(collection(db, 'artifacts', appId, 'public', 'data', collectionName), docId), data, { merge: true });
                        count++;
                        operations++;
                        
                        if (operations >= 490) {
                            await batch.commit();
                            batch = writeBatch(db);
                            operations = 0;
                        }
                    }
                }
                
                if (operations > 0) await batch.commit();
                
                logAction(`IMPORT_${collectionName.toUpperCase()}`, `นำเข้า/อัปเดต ข้อมูลจำนวน ${count} รายการ`);
                showStatus(`ดำเนินการนำเข้าข้อมูล ${count} รายการเสร็จสิ้น`);
            };

            // Export to CSV Function
            const exportToCSV = (data, filename) => {
                if (!data || data.length === 0) { showStatus("ไม่มีข้อมูลสำหรับส่งออก"); return; }
                const headers = Object.keys(data[0]); 
                const csvContent = [
                    headers.join(','),
                    ...data.map(row => headers.map(h => `"${(row[h] || '').toString().replace(/"/g, '""')}"`).join(','))
                ].join('\n');
                const blob = new Blob(["\ufeff", csvContent], { type: 'text/csv;charset=utf-8;' }); 
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `${filename}.csv`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // Local Import CSV
            const handleImportCSV = (e, collectionName) => {
                const file = e.target.files[0];
                if (!file) return;
                showStatus("กำลังอ่านและนำเข้าข้อมูล...");
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        await processCSVText(event.target.result, collectionName);
                    } catch (err) {
                        console.error(err);
                        showStatus("เกิดข้อผิดพลาดในการนำเข้าข้อมูล โปรดตรวจสอบรูปแบบไฟล์ CSV");
                    }
                    e.target.value = null;
                };
                reader.readAsText(file);
            };

            // Sync from Google Sheet Function
            const importFromGoogleSheet = async (sheetName) => {
                if(!confirm(`ยืนยันการดึงข้อมูลจาก Google Sheet แผ่นงาน: ${sheetName} ?\n(แผ่นงานต้นทางต้องเปิดแชร์สาธารณะ)`)) return;
                showStatus(`กำลังเชื่อมต่อ Google Sheet (${sheetName})...`);
                try {
                    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;
                    const response = await fetch(url);
                    if (!response.ok) throw new Error("ไม่สามารถอ่านข้อมูลได้");
                    const csvText = await response.text();
                    
                    if (csvText.startsWith("<!DOCTYPE html>")) throw new Error("ไม่ได้รับอนุญาตให้เข้าถึง Sheet โปรดตั้งค่า Share เป็น Anyone with the link");
                    
                    await processCSVText(csvText, sheetName);
                } catch (err) {
                    console.error(err);
                    showStatus("เกิดข้อผิดพลาด: " + err.message);
                }
            };

            // Setup Real-time clock
            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const formatDateTime = (date) => {
                const days = ['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'];
                const months = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
                const h = String(date.getHours()).padStart(2, '0');
                const m = String(date.getMinutes()).padStart(2, '0');
                const s = String(date.getSeconds()).padStart(2, '0');
                return `GMT+7 วัน${days[date.getDay()]}ที่ ${date.getDate()} ${months[date.getMonth()]} พ.ศ. ${date.getFullYear() + 543} เวลา ${h}.${m}.${s}`;
            };

            useEffect(() => {
                signInAnonymously(auth).catch(e => console.warn("Anonymous Auth Disabled", e));

                const baseRef = (col) => collection(db, 'artifacts', appId, 'public', 'data', col);
                
                const unsubS = onSnapshot(baseRef('seminar'), s => setSeminar(s.docs.map(d => ({id: d.id, ...d.data()}))), e => console.warn(e));
                const unsubG = onSnapshot(baseRef('guests'), s => setGuests(s.docs.map(d => ({id: d.id, ...d.data()}))), e => console.warn(e));
                const unsubR = onSnapshot(baseRef('rooms'), s => setRooms(s.docs.map(d => ({id: d.id, ...d.data()}))), e => console.warn(e));
                const unsubL = onSnapshot(baseRef('logs'), s => setLogs(s.docs.map(d => ({id: d.id, ...d.data()}))), e => console.warn(e));
                
                const unsubU = onSnapshot(baseRef('units'), s => {
                    const data = s.docs.map(d => ({docId: d.id, ...d.data()}));
                    setUnits(data.sort((a, b) => parseInt(a.id || "0") - parseInt(b.id || "0")));
                }, (err) => {
                    console.error("Units Error:", err);
                    showStatus("⚠️ ไม่สามารถดึงข้อมูลหน่วยได้: กรุณาปลดล็อค Firebase Rules");
                });
                
                const unsubA = onSnapshot(baseRef('admins'), (s) => {
                    const data = s.docs.map(d => ({id: d.id, ...d.data()}));
                    setAdmins(data);
                    
                    if (data.length === 0) {
                        setDoc(doc(baseRef('admins'), 'admin_default'), { 
                            name: 'Super Admin', username: 'admin', password: 'password', roles: ['SUPER_ADMIN'] 
                        }).catch(e => console.warn(e));
                    }
                    setIsDataLoaded(true);
                }, (err) => {
                    console.error("Admins Error:", err);
                    setIsDataLoaded(true);
                    setLoginError("⚠️ ติดปัญหา Firebase Rules ทำให้ตรวจสอบรหัสผ่านไม่ได้");
                });
                
                return () => { unsubS(); unsubG(); unsubR(); unsubU(); unsubA(); unsubL(); };
            }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                if (!isDataLoaded) { setLoginError("กำลังเชื่อมต่อเซิร์ฟเวอร์..."); return; }
                
                const u = loginForm.username.trim();
                const p = loginForm.password.trim();
                const matched = admins.find(a => String(a.username) === u && String(a.password) === p);
                
                if (matched) { 
                    setAdminProfile(matched); 
                    setIsLoginView(false); 
                    setLoginError("");
                    logAction("LOGIN", matched.name); 
                } else if (u === 'admin' && p === 'password') {
                    setAdminProfile({ name: 'Super Admin (Offline Mode)', username: 'admin', roles: ['SUPER_ADMIN'] });
                    setIsLoginView(false);
                    setLoginError("");
                    showStatus("เข้าสู่ระบบด้วยสิทธิ์ผู้ดูแลฉุกเฉิน");
                } else {
                    setLoginError("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");
                }
            };

            const handleNav = (sheet) => {
                setIsLoginView(false); 
                setActiveSheet(sheet);
            };

            const seedUnits = async () => {
                if (isSeedingRef.current) return;
                isSeedingRef.current = true;

                                    <li>เพิ่มยศ พ.อ. (พิเศษ) และ จ.ส.อ. (พิเศษ) ในรายการตัวเลือกยศ</li>
                                    <li>เพิ่มตัวเลือกยศ "อื่นๆ" พร้อมช่องระบุ สำหรับชุดข้อมูลกองอำนวยการ</li>
                                    <li>ปรับปรุงส่วนนำเข้า/ส่งออก ให้แสดง "ชุดข้อมูล กองอำนวยการ" ชัดเจนขึ้น</li>
                                </ul>
                            </div>
                            <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                <h4 className="font-black text-slate-500 uppercase tracking-widest mb-2">v12.1.3H STABLE</h4>
                                <ul className="list-disc pl-5 space-y-1 text-xs text-slate-500">
                                    <li>เพิ่มระบบ Import ข้อมูลจากไฟล์ CSV (นำเข้าทับข้อมูลเดิม/เพิ่มข้อมูลใหม่)</li>
                                    <li>ปรับปรุงระบบ Export ให้ส่งออก ID เพื่อใช้ประกอบการ Import ได้สมบูรณ์</li>
                                </ul>
                            </div>
                            <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                <h4 className="font-black text-slate-500 uppercase tracking-widest mb-2">v12.1.3G STABLE</h4>
                                <ul className="list-disc pl-5 space-y-1 text-xs text-slate-500">
                                    <li>เพิ่มระบบจัดเก็บ Timestamp รูปแบบ Google Sheet</li>
                                    <li>แสดงเวลาสร้างและเวลาแก้ไขล่าสุด ในฟอร์มแก้ไขผู้เข้าสัมมนา และ กองอำนวยการ</li>
                                </ul>
                            </div>
                        </div>
                    </Modal>

                    <Modal title={isEditMode ? "แก้ไขข้อมูลสัมมนา" : "ลงทะเบียนผู้เข้าร่วมสัมมนา"} isOpen={isSeminarModalOpen} onClose={()=>setIsSeminarModalOpen(false)}>
                        <form onSubmit={saveSeminar} className="space-y-4 text-left">
                            
                            {/* Timestamp Display for Admin in Edit Mode */}
                            {(adminProfile && isEditMode && (seminarForm.createdAt || seminarForm.updatedAt)) && (
                                <div className="bg-indigo-50/50 p-3 rounded-xl mb-4 text-[10px] font-mono text-slate-500 border border-indigo-100 flex flex-col md:flex-row justify-between gap-2">
                                    <div><span className="font-bold text-slate-700">ลงทะเบียน:</span> {seminarForm.createdAt || '-'}</div>
                                    <div><span className="font-bold text-slate-700">แก้ไขล่าสุด:</span> {seminarForm.updatedAt || '-'}</div>
                                </div>
                            )}

                            <div className="section-box">
                                <h4 className="section-title">1. หมวดข้อมูลหน่วย</h4>
                                <div className="grid grid-cols-2 gap-4">
                                    <Field label="กองทัพภาค"><select required={!adminProfile} className="input-field" value={seminarForm.region} onChange={e=>setSeminarForm({...seminarForm, region: e.target.value, unitName: ''})}><option value="">เลือก</option>{REGIONS_LIST.map(r=><option key={r} value={r}>{r}</option>)}</select></Field>
                                    <Field label="หน่วย"><select required={!adminProfile} className="input-field" value={seminarForm.unitName} onChange={e=>setSeminarForm({...seminarForm, unitName: e.target.value})}><option value="">เลือกหน่วย</option>{units.filter(u=>u.region===seminarForm.region).map(u=><option key={u.id} value={`${u.id} : ${u.name}`}>{u.id} : {u.name}</option>)}</select></Field>
                                </div>
                            </div>
                            <div className="section-box">
                                <h4 className="section-title">2. หมวดข้อมูลผู้ลงทะเบียน</h4>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                                    <Field label="ยศ"><select required={!adminProfile} className="input-field" value={seminarForm.rank} onChange={e=>setSeminarForm({...seminarForm, rank:e.target.value})}><option value="">ยศ</option>{RANKS.map(r=><option key={r} value={r}>{r}</option>)}</select></Field>
                                    <Field label="ชื่อ"><input required={!adminProfile} className="input-field" value={seminarForm.firstName} onChange={e=>setSeminarForm({...seminarForm, firstName: e.target.value})} /></Field>
                                    <Field label="นามสกุล"><input required={!adminProfile} className="input-field" value={seminarForm.lastName} onChange={e=>setSeminarForm({...seminarForm, lastName: e.target.value})} /></Field>
                                    <Field label="ชื่อเล่น"><input className="input-field" value={seminarForm.nickname} onChange={e=>setSeminarForm({...seminarForm, nickname: e.target.value})} /></Field>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
                                    <Field label="เบอร์มือถือ"><input required={!adminProfile} className="input-field font-mono" value={seminarForm.phone} onChange={e=>setSeminarForm({...seminarForm, phone: e.target.value})} /></Field>
                                    <Field label="Line ID"><input className="input-field font-mono" value={seminarForm.lineId} onChange={e=>setSeminarForm({...seminarForm, lineId: e.target.value})} /></Field>
                                    <Field label="ตำแหน่ง"><input required={!adminProfile} className="input-field" value={seminarForm.position} onChange={e=>setSeminarForm({...seminarForm, position: e.target.value})} /></Field>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                                    <Field label="กำเนิด"><select required={!adminProfile} className="input-field" value={seminarForm.origin} onChange={e=>setSeminarForm({...seminarForm, origin: e.target.value})}><option value="">เลือก</option>{ORIGINS.map(o=><option key={o} value={o}>{o}</option>)}</select></Field>
                                    {seminarForm.origin === 'อื่นๆ' && <Field label="ระบุ"><input required={!adminProfile} className="input-field" value={seminarForm.originOther} onChange={e=>setSeminarForm({...seminarForm, originOther: e.target.value})} /></Field>}
                                    <Field label="รุ่น"><input className="input-field" value={seminarForm.batch} onChange={e=>setSeminarForm({...seminarForm, batch: e.target.value})} /></Field>
                                    <Field label="ปี พ.ศ."><input className="input-field" value={seminarForm.year} onChange={e=>setSeminarForm({...seminarForm, year: e.target.value})} /></Field>
                                </div>
                                {seminarForm.origin !== 'นตท.' && seminarForm.origin !== '' && (
                                    <div className="grid grid-cols-2 gap-3 mb-4 p-3 bg-indigo-50 rounded-xl">
                                        <Field label="นป. รุ่น"><input className="input-field" value={seminarForm.npBatch} onChange={e=>setSeminarForm({...seminarForm, npBatch: e.target.value})} /></Field>
                                        <Field label="นป. ปี พ.ศ."><input className="input-field" value={seminarForm.npYear} onChange={e=>setSeminarForm({...seminarForm, npYear: e.target.value})} /></Field>
                                    </div>
                                )}
                                <Field label="ประสบการณ์ฝึกทหารใหม่"><select className="input-field" value={seminarForm.trainingExp} onChange={e=>setSeminarForm({...seminarForm, trainingExp: e.target.value})}>{TRAINING_EXP.map(t=><option key={t} value={t}>{t}</option>)}</select></Field>
                            </div>
                            <div className="section-box">
                                <h4 className="section-title">3. หมวดข้อมูลการเข้าพัก</h4>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                    <Field label="การเดินทาง"><select className="input-field" value={seminarForm.travelBy} onChange={e=>setSeminarForm({...seminarForm, travelBy: e.target.value})}>{TRAVEL_METHODS.map(t=><option key={t} value={t}>{t}</option>)}</select></Field>
                                    <Field label="ความต้องการที่พัก"><select className="input-field" value={seminarForm.roomTypePref} onChange={e=>setSeminarForm({...seminarForm, roomTypePref: e.target.value})}>{ROOM_TYPES.map(r=><option key={r} value={r}>{r}</option>)}</select></Field>
                                </div>
                                <Field label="ข้อจำกัดด้านอาหาร"><select className="input-field" value={seminarForm.dietary} onChange={e=>setSeminarForm({...seminarForm, dietary: e.target.value})}>{DIETARY_RESTRICTIONS.map(d=><option key={d} value={d}>{d}</option>)}</select></Field>
                            </div>
                            <div className="section-box">
                                <h4 className="section-title">4. หมายเหตุ</h4>
                                <textarea className="input-field min-h-[80px]" value={seminarForm.remarks} onChange={e=>setSeminarForm({...seminarForm, remarks: e.target.value})} placeholder="ระบุข้อมูลเพิ่มเติม (ถ้ามี)"></textarea>
                            </div>
                            
                            {/* หมวดผู้ดูแล: แสดงเฉพาะแอดมิน หรือ โหมดแก้ไขที่เคยบันทึกไว้แล้ว */}
                            {(adminProfile || isEditMode) && (
                                <div className="section-box bg-rose-50 border-rose-200">
                                    <h4 className="section-title !text-rose-600 !border-rose-600">5. หมวดผู้ดูแล (สำหรับแอดมิน)</h4>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                        <Field label="หมายเลขห้อง (จัดที่พัก)">
                                            <select className="input-field border-rose-200 focus:border-rose-500" value={seminarForm.roomId || ''} onChange={e=>setSeminarForm({...seminarForm, roomId: e.target.value})}>
                                                <option value="">-- ยังไม่จัดห้อง --</option>
                                                {rooms.map(r => <option key={r.id} value={r.id}>{r.roomNo} ({r.type})</option>)}
                                            </select>
                                        </Field>
                                        <Field label="สิทธิ์การเบิกจ่าย"><select className="input-field border-rose-200 focus:border-rose-500" value={seminarForm.disbursement} onChange={e=>setSeminarForm({...seminarForm, disbursement: e.target.value})}><option value="เบิกไม่ได้">เบิกไม่ได้</option><option value="เบิกได้">เบิกได้</option></select></Field>
                                    </div>
                                    {seminarForm.roomTypePref === 'พักเดี่ยว' && (
                                        <Field label="ชำระค่าห้อง (พักเดี่ยว)"><select className="input-field border-rose-200 focus:border-rose-500 bg-white" value={seminarForm.paymentStatus || 'ยังไม่จ่าย'} onChange={e=>setSeminarForm({...seminarForm, paymentStatus: e.target.value})}><option value="ยังไม่จ่าย">ยังไม่จ่าย</option><option value="จ่ายแล้ว">จ่ายแล้ว</option></select></Field>
                                    )}
                                </div>
                            )}

                            <button type="submit" className="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold uppercase shadow-xl hover:scale-[1.02] transition-all">บันทึกข้อมูลการลงทะเบียน</button>
                        </form>
                    </Modal>

                    <Modal title={isEditMode ? "แก้ไขกองอำนวยการ" : "เพิ่มรายชื่อกองอำนวยการ"} isOpen={isGuestModalOpen} onClose={()=>setIsGuestModalOpen(false)}>
                        <form onSubmit={saveGuest} className="space-y-6 text-left">
                            
                            {/* Timestamp Display for Admin in Edit Mode (Guest) */}
                            {(adminProfile && isEditMode && (guestForm.createdAt || guestForm.updatedAt)) && (
                                <div className="bg-indigo-50/50 p-3 rounded-xl mb-4 text-[10px] font-mono text-slate-500 border border-indigo-100 flex flex-col md:flex-row justify-between gap-2">
                                    <div><span className="font-bold text-slate-700">ลงทะเบียน:</span> {guestForm.createdAt || '-'}</div>
                                    <div><span className="font-bold text-slate-700">แก้ไขล่าสุด:</span> {guestForm.updatedAt || '-'}</div>
                                </div>
                            )}

                            <Field label="ประเภท"><select className="input-field font-bold" value={guestForm.category} onChange={e=>setGuestForm({...guestForm, category: e.target.value})}>{CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}</select></Field>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-left">
                                <Field label="ยศ"><select required className="input-field" value={guestForm.rank} onChange={e=>setGuestForm({...guestForm, rank:e.target.value})}><option value="">ยศ</option>{GUEST_RANKS.map(r=><option key={r} value={r}>{r}</option>)}</select></Field>
                                {guestForm.rank === 'อื่นๆ' && <Field label="ระบุยศ"><input required className="input-field" value={guestForm.rankOther || ''} onChange={e=>setGuestForm({...guestForm, rankOther: e.target.value})} placeholder="ระบุ..." /></Field>}
                                <Field label="ชื่อ"><input required className="input-field" value={guestForm.firstName} onChange={e=>setGuestForm({...guestForm, firstName: e.target.value})} /></Field>
                                <Field label="นามสกุล"><input required className="input-field" value={guestForm.lastName} onChange={e=>setGuestForm({...guestForm, lastName: e.target.value})} /></Field>
                                <Field label="ชื่อเล่น"><input className="input-field" value={guestForm.nickname} onChange={e=>setGuestForm({...guestForm, nickname: e.target.value})} /></Field>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 text-left">
                                <Field label="หน่วยงาน/ตำแหน่ง"><input required className="input-field" value={guestForm.unit} onChange={e=>setGuestForm({...guestForm, unit: e.target.value})} /></Field>
                                <Field label="เบอร์โทรศัพท์"><input className="input-field font-mono" value={guestForm.phone || ''} onChange={e=>setGuestForm({...guestForm, phone: e.target.value})} placeholder="08X-XXX-XXXX" /></Field>
                            </div>
                            <button className="w-full py-4 bg-slate-900 text-white rounded-xl font-bold uppercase text-[10px] tracking-widest shadow-xl leading-none">บันทึกข้อมูลกองอำนวยการ</button>
                        </form>
                    </Modal>

                    <Modal title={isEditMode ? "แก้ไขห้องพัก" : "เพิ่มห้องพักใหม่"} isOpen={isRoomModalOpen} onClose={()=>setIsRoomModalOpen(false)}>
                        <form onSubmit={saveRoom} className="space-y-6 text-left">
                            <div className="grid grid-cols-2 gap-4">
                                <Field label="เลขห้อง"><input required className="input-field font-bold text-lg" value={roomForm.roomNo} onChange={e=>setRoomForm({...roomForm, roomNo:e.target.value})} placeholder="เช่น A101"/></Field>
                                <Field label="ประเภท"><select required className="input-field" value={roomForm.type} onChange={e=>setRoomForm({...roomForm, type:e.target.value})}><option value="พักรวม">พักรวม</option><option value="พักเดี่ยว">พักเดี่ยว</option></select></Field>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <Field label="สถานะห้อง"><select className="input-field" value={roomForm.status || 'ว่าง'} onChange={e=>setRoomForm({...roomForm, status:e.target.value})}>{ROOM_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}</select></Field>
                                {roomForm.status === 'อื่นๆ' && <Field label="ระบุสถานะอื่นๆ"><input required className="input-field" value={roomForm.statusOther || ''} onChange={e=>setRoomForm({...roomForm, statusOther:e.target.value})} placeholder="โปรดระบุ"/></Field>}
                            </div>
                            <button className="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold uppercase tracking-widest text-[11px] shadow-lg leading-none hover:bg-indigo-700">บันทึกห้องพัก</button>
                        </form>
                    </Modal>

                    <Modal title={isEditMode ? "แก้ไขแอดมิน" : "เพิ่มแอดมินใหม่"} isOpen={isAdminModalOpen} onClose={()=>setIsAdminModalOpen(false)}>
                        <form onSubmit={saveAdmin} className="space-y-6 text-left">
                            <Field label="ชื่อ-นามสกุล"><input required className="input-field font-bold" value={adminForm.name} onChange={e=>setAdminForm({...adminForm, name: e.target.value})} /></Field>
                            <div className="grid grid-cols-2 gap-4"><Field label="Username"><input required className="input-field font-mono" value={adminForm.username} onChange={e=>setAdminForm({...adminForm, username: e.target.value})} /></Field><Field label="Password"><input required type="text" className="input-field font-mono" value={adminForm.password} onChange={e=>setAdminForm({...adminForm, password: e.target.value})} /></Field></div>
                            <div className="section-box"><h4 className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">สิทธิ์การเข้าถึง</h4><div className="grid grid-cols-2 gap-3">{Object.keys(ROLES_CONFIG).map(k => (<label key={k} className="flex items-center gap-3 p-3 bg-white rounded-xl border cursor-pointer hover:bg-indigo-50 transition-colors"><input type="checkbox" className="w-4 h-4 text-indigo-600 rounded" checked={adminForm.roles?.includes(k)} onChange={(e) => { let nr = [...(adminForm.roles || [])]; if (e.target.checked) nr.push(k); else nr = nr.filter(r => r !== k); setAdminForm({...adminForm, roles: nr}); }} /><span className="text-[11px] font-bold text-slate-700">{ROLES_CONFIG[k].label}</span></label>))}</div></div>
                            <button className="w-full py-4 bg-slate-900 text-white rounded-xl font-bold uppercase tracking-widest text-[11px] shadow-lg leading-none">บันทึกข้อมูลแอดมิน</button>
                        </form>
                    </Modal>

                    <Modal title={isEditMode ? "แก้ไขหน่วยงาน" : "เพิ่มหน่วยงานใหม่"} isOpen={isUnitModalOpen} onClose={()=>setIsUnitModalOpen(false)}>
                        <form onSubmit={saveUnit} className="space-y-6 text-left">
                            <div className="grid grid-cols-2 gap-4">
                                <Field label="รหัสหน่วย (3 หลัก)"><input required className="input-field font-mono" value={unitForm.id} onChange={e=>setUnitForm({...unitForm, id:e.target.value})} placeholder="001" disabled={isEditMode}/></Field>
                                <Field label="กองทัพภาค"><select required className="input-field" value={unitForm.region} onChange={e=>setUnitForm({...unitForm, region:e.target.value})}><option value="">เลือกภาค</option>{REGIONS_LIST.map(r=><option key={r} value={r}>{r}</option>)}</select></Field>
                            </div>
                            <Field label="ชื่อหน่วยงาน"><input required className="input-field" value={unitForm.name} onChange={e=>setUnitForm({...unitForm, name:e.target.value})} placeholder="ระบุชื่อหน่วย"/></Field>
                            <button className="w-full py-4 bg-slate-900 text-white rounded-xl font-bold uppercase tracking-widest text-[11px] shadow-lg leading-none">บันทึกฐานข้อมูลหน่วย</button>
                        </form>
                    </Modal>

                    {statusMsg && <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl font-bold text-[10px] uppercase border border-white/10 animate-in fade-in slide-in-from-bottom-5 text-center leading-relaxed max-w-[90vw]">{statusMsg}</div>}
                    <footer className="p-8 text-center text-[10px] text-slate-300 font-bold uppercase tracking-[0.4em] opacity-40">Stable Build 12.1.4a | Military Portal Integration</footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
