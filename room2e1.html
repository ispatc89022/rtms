<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTMS Admin - Full Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        .subtab-active { color: #4f46e5; border-bottom: 3px solid #4f46e5; }
        .input-box { width: 100%; border: 1.5px solid #e2e8f0; padding: 0.75rem; border-radius: 1rem; outline: none; font-size: 14px; font-weight: 600; }
        .input-box:focus { border-color: #4f46e5; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .room-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid #f1f5f9; background: white; border-radius: 2rem; }
        .room-card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); border-color: #e2e8f0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .checkbox-item { width: 22px; height: 22px; border-radius: 6px; border: 2px solid #cbd5e1; cursor: pointer; display: flex; align-items: center; justify-content: center; background: white; }
        .checkbox-item.active { background-color: #4f46e5; border-color: #4f46e5; color: white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyClnFib72Jwn2umtlG0fD4jBaE-aG1ceWk",
            authDomain: "rtcdb-66284.firebaseapp.com",
            projectId: "rtcdb-66284",
            storageBucket: "rtcdb-66284.firebasestorage.app",
            messagingSenderId: "800467259752",
            appId: "1:800467259752:web:961e90546df3390e2b06dd"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Collections
        const seminarCol = db.collection('artifacts/military-system-v12/public/data/seminar');
        const guestsCol = db.collection('artifacts/military-system-v12/public/data/guests');
        const roomsCol = db.collection('artifacts/military-system-v12/public/data/rooms');
        const adminsCol = db.collection('artifacts/military-system-v12/public/data/admins');

        const App = () => {
            const [adminProfile, setAdminProfile] = useState(null);
            const [loginForm, setLoginForm] = useState({ user: '', pass: '' });
            const [mode, setMode] = useState('guest'); 
            const [adminSubTab, setAdminSubTab] = useState('requests'); 
            const [list, setList] = useState([]);
            const [rooms, setRooms] = useState([]);
            const [guests, setGuests] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [accSearchTerm, setAccSearchTerm] = useState(''); // เพิ่มสำหรับจัดการที่พัก
            const [selectedIds, setSelectedIds] = useState([]);
            const [isConfirming, setIsConfirming] = useState(false);

            useEffect(() => {
                const saved = localStorage.getItem('rtms_admin_session');
                if (saved) setAdminProfile(JSON.parse(saved));
                
                const unsubS = seminarCol.onSnapshot(s => setList(s.docs.map(d => ({docId: d.id, ...d.data()}))));
                const unsubR = roomsCol.onSnapshot(s => setRooms(s.docs.map(d => ({docId: d.id, ...d.data()}))));
                const unsubG = guestsCol.onSnapshot(s => setGuests(s.docs.map(d => ({docId: d.id, ...d.data()}))));
                return () => { unsubS(); unsubR(); unsubG(); };
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                const snap = await adminsCol.where('username', '==', loginForm.user).where('password', '==', loginForm.pass).get();
                if (!snap.empty) {
                    const data = { id: snap.docs[0].id, ...snap.docs[0].data() };
                    setAdminProfile(data);
                    localStorage.setItem('rtms_admin_session', JSON.stringify(data));
                    setMode('admin');
                } else {
                    alert("❌ Username หรือ Password ไม่ถูกต้อง");
                }
            };

            const assignRoom = async (personDocId, roomNo, type = 'seminar') => {
                const col = type === 'guests' ? guestsCol : seminarCol;
                await col.doc(personDocId).update({ 
                    roomId: roomNo, 
                    roomStatus: roomNo ? 'อนุมัติแล้ว' : 'ปกติ' 
                });
            };

            const pendingPairs = useMemo(() => {
                const pairs = [];
                const seen = new Set();
                list.filter(p => p.roomStatus === 'รออนุมัติ' && p.pendingPairWith).forEach(p => {
                    if (seen.has(p.docId)) return;
                    const partner = list.find(pt => pt.docId === p.pendingPairWith);
                    if (partner) {
                        pairs.push({ p1: p, p2: partner });
                        seen.add(p.docId); seen.add(partner.docId);
                    }
                });
                return pairs;
            }, [list]);

            const handleApprovePairWithRoom = async (pair, roomNo) => {
                if (!roomNo) return;
                const batch = db.batch();
                [pair.p1, pair.p2].forEach(p => {
                    batch.update(seminarCol.doc(p.docId), { 
                        roomStatus: 'อนุมัติแล้ว', 
                        roomId: roomNo, 
                        pendingPairWith: null 
                    });
                });
                await batch.commit();
            };

            // --- Guest Logic ---
            const handleSelect = (person) => {
                if (selectedIds.includes(person.docId)) {
                    setSelectedIds(selectedIds.filter(id => id !== person.docId));
                    return;
                }
                if (person.roomTypePref === 'พักเดี่ยว') {
                    alert("⚠️ คุณยื่นขอที่พักเดี่ยวไว้ในระบบแล้ว");
                    return;
                }
                if (selectedIds.length < 2) setSelectedIds([...selectedIds, person.docId]);
            };

            const submitPairing = async () => {
                const batch = db.batch();
                selectedIds.forEach((id, idx) => {
                    const partnerId = selectedIds[idx === 0 ? 1 : 0];
                    batch.update(seminarCol.doc(id), { roomStatus: 'รออนุมัติ', pendingPairWith: partnerId });
                });
                await batch.commit();
                setSelectedIds([]); setIsConfirming(false);
                alert("✅ ส่งคำร้องขอจับคู่สำเร็จ");
            };

            const filteredList = list.filter(i => 
                `${i.firstName} ${i.lastName} ${i.unitName} ${i.id}`.toLowerCase().includes(searchTerm.toLowerCase())
            ).sort((a, b) => (a.id > b.id ? 1 : -1));

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-slate-900 px-8 py-4 flex justify-between items-center sticky top-0 z-50 shadow-xl">
                        <div className="flex items-center gap-6">
                            <h1 className="text-white font-black italic text-xl uppercase tracking-tighter">RTMS System</h1>
                            <nav className="flex bg-slate-800 p-1 rounded-xl">
                                <button onClick={() => setMode('guest')} className={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${mode === 'guest' ? 'bg-indigo-600 text-white' : 'text-slate-500'}`}>จับคู่ที่พัก</button>
                                <button onClick={() => setMode('admin')} className={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${mode === 'admin' ? 'bg-indigo-600 text-white' : 'text-slate-500'}`}>แอดมิน</button>
                            </nav>
                        </div>
                        {adminProfile && mode === 'admin' && (
                            <button onClick={() => { localStorage.removeItem('rtms_admin_session'); setAdminProfile(null); }} className="text-rose-400 text-[10px] font-black uppercase border border-rose-400/30 px-3 py-1.5 rounded-lg">Logout</button>
                        )}
                    </header>

                    <main className="p-6 max-w-[1600px] mx-auto w-full flex-1">
                        {mode === 'admin' && !adminProfile ? (
                            <div className="flex items-center justify-center py-20">
                                <form onSubmit={handleLogin} className="bg-white p-10 rounded-[3rem] w-full max-w-sm shadow-2xl border-t-8 border-indigo-600 font-bold">
                                    <h2 className="text-2xl font-black text-center mb-8 uppercase">Admin Login</h2>
                                    <div className="space-y-4">
                                        <input className="input-box" placeholder="Username" onChange={e => setLoginForm({...loginForm, user: e.target.value})} required />
                                        <input className="input-box" type="password" placeholder="Password" onChange={e => setLoginForm({...loginForm, pass: e.target.value})} required />
                                        <button className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg hover:bg-indigo-700 transition-all">เข้าสู่ระบบ</button>
                                    </div>
                                </form>
                            </div>
                        ) : mode === 'admin' ? (
                            <div className="space-y-6">
                                {/* Sub Menu แอดมิน */}
                                <div className="flex gap-8 border-b border-slate-200 mb-4 overflow-x-auto no-scrollbar">
                                    <button onClick={() => setAdminSubTab('requests')} className={`pb-3 text-sm font-black uppercase tracking-widest transition-all whitespace-nowrap ${adminSubTab === 'requests' ? 'subtab-active' : 'text-slate-400'}`}>คำร้องขอจับคู่</button>
                                    <button onClick={() => setAdminSubTab('accommodation')} className={`pb-3 text-sm font-black uppercase tracking-widest transition-all whitespace-nowrap ${adminSubTab === 'accommodation' ? 'subtab-active' : 'text-slate-400'}`}>จัดการที่พัก</button>
                                    <button onClick={() => setAdminSubTab('manage_rooms')} className={`pb-3 text-sm font-black uppercase tracking-widest transition-all whitespace-nowrap ${adminSubTab === 'manage_rooms' ? 'subtab-active' : 'text-slate-400'}`}>จัดการห้อง (Dashboard)</button>
                                    <button onClick={() => setAdminSubTab('staff')} className={`pb-3 text-sm font-black uppercase tracking-widest transition-all whitespace-nowrap ${adminSubTab === 'staff' ? 'subtab-active' : 'text-slate-400'}`}>กองอำนวยการ</button>
                                </div>

                                {adminSubTab === 'requests' && (
                                    <div className="animate-in fade-in duration-500">
                                        <h3 className="text-xl font-black text-slate-800 mb-6 uppercase">🚨 คำร้องที่รอดำเนินการ ({pendingPairs.length} คู่)</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                            {pendingPairs.map((pair, idx) => (
                                                <div key={idx} className="admin-card p-6 border-amber-200 bg-amber-50/30">
                                                    <div className="space-y-3 mb-6">
                                                        <div className="p-3 bg-white rounded-2xl border shadow-sm text-sm">
                                                            <p className="font-bold">{pair.p1.rank}{pair.p1.firstName} {pair.p1.lastName}</p>
                                                            <p className="text-[10px] text-slate-400 font-bold uppercase">{pair.p1.unitName}</p>
                                                        </div>
                                                        <div className="text-center font-black text-indigo-500 text-[10px] uppercase italic">พักร่วมกับ</div>
                                                        <div className="p-3 bg-white rounded-2xl border shadow-sm text-sm">
                                                            <p className="font-bold">{pair.p2.rank}{pair.p2.firstName} {pair.p2.lastName}</p>
                                                            <p className="text-[10px] text-slate-400 font-bold uppercase">{pair.p2.unitName}</p>
                                                        </div>
                                                    </div>
                                                    <select 
                                                        className="w-full bg-slate-900 text-white text-xs font-black p-3 rounded-xl outline-none"
                                                        onChange={(e) => handleApprovePairWithRoom(pair, e.target.value)}
                                                        value=""
                                                    >
                                                        <option value="">-- เลือกห้องเพื่ออนุมัติ --</option>
                                                        {rooms.map(r => <option key={r.docId} value={r.roomNo}>{r.roomNo} ({r.type})</option>)}
                                                    </select>
                                                </div>
                                            ))}
                                            {pendingPairs.length === 0 && <p className="text-slate-400 italic py-10 text-center font-bold">ไม่มีคำร้องรอดำเนินการ</p>}
                                        </div>
                                    </div>
                                )}

                                {adminSubTab === 'accommodation' && (
                                    <div className="animate-in fade-in duration-500 space-y-6">
                                        <div className="flex justify-between items-center px-2">
                                            <h3 className="text-xl font-black text-slate-800 uppercase tracking-tight">Accommodation Overview</h3>
                                            <input className="input-box w-64 bg-white shadow-sm border-2" placeholder="ค้นหาเลขห้อง..." onChange={e => setAccSearchTerm(e.target.value)} />
                                        </div>
                                        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                                            {rooms.filter(r => r.roomNo.includes(accSearchTerm)).map(room => {
                                                const occupants = [...list, ...guests].filter(p => p.roomId === room.roomNo);
                                                const cap = room.type === 'พักรวม' ? 2 : 1;
                                                return (
                                                    <div key={room.docId} className="room-card p-6 text-center flex flex-col h-full border-2">
                                                        <span className="text-[10px] font-black text-slate-400 uppercase mb-2 leading-none">{room.type}</span>
                                                        <h4 className="text-4xl font-black text-slate-800 mb-4 tracking-tighter">{room.roomNo}</h4>
                                                        <div className="flex-1 space-y-2 mb-6">
                                                            {occupants.map(occ => (
                                                                <div key={occ.docId} className="bg-slate-50 p-2 rounded-xl border border-slate-100 flex justify-between items-center group">
                                                                    <div className="text-left overflow-hidden">
                                                                        <p className="text-[11px] font-black text-slate-700 truncate leading-none">{occ.firstName}</p>
                                                                        <p className="text-[8px] text-slate-400 truncate mt-1">{occ.unitName || occ.category}</p>
                                                                    </div>
                                                                    <button onClick={() => assignRoom(occ.docId, '', occ.category ? 'guests' : 'seminar')} className="text-rose-400 hover:text-rose-600 transition-colors opacity-0 group-hover:opacity-100 font-black">✕</button>
                                                                </div>
                                                            ))}
                                                            {occupants.length === 0 && <p className="text-[10px] text-slate-300 italic py-4">ห้องว่าง</p>}
                                                        </div>
                                                        <div className={`mt-auto text-[9px] font-black uppercase py-1.5 rounded-full border ${occupants.length >= cap ? 'bg-rose-50 text-rose-500 border-rose-100' : 'bg-emerald-50 text-emerald-600 border-emerald-100'}`}>
                                                            {occupants.length >= cap ? 'เต็ม / Full' : `ว่าง ${cap - occupants.length} ที่`}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}

                                {adminSubTab === 'manage_rooms' && (
                                    <div className="grid grid-cols-1 xl:grid-cols-12 gap-8 animate-in fade-in duration-500">
                                        <div className="xl:col-span-8 bg-white rounded-[2.5rem] border-2 border-slate-100 overflow-hidden shadow-sm">
                                            <div className="p-6 bg-slate-50 border-b flex justify-between items-center">
                                                <h3 className="font-black text-slate-800 uppercase">จัดการรายชื่อสัมมนา</h3>
                                                <input className="border-2 rounded-xl px-4 py-2 text-xs w-64 outline-none focus:border-indigo-500" placeholder="ค้นหาชื่อ/หน่วย..." onChange={e => setSearchTerm(e.target.value)} />
                                            </div>
                                            <div className="overflow-x-auto max-h-[700px] overflow-y-auto no-scrollbar">
                                                <table className="w-full text-left text-sm font-bold">
                                                    <thead className="bg-slate-100 text-[10px] text-slate-400 uppercase tracking-widest font-black sticky top-0 z-10 shadow-sm border-b">
                                                        <tr><th className="p-5">ผู้ลงทะเบียน</th><th className="p-5">หน่วย</th><th className="p-5 text-center">ห้องพัก</th><th className="p-5 text-center">สถานะ</th></tr>
                                                    </thead>
                                                    <tbody className="divide-y text-slate-700">
                                                        {filteredList.map(p => (
                                                            <tr key={p.docId} className="hover:bg-slate-50">
                                                                <td className="p-5">
                                                                    <p>{p.rank}{p.firstName} {p.lastName}</p>
                                                                    <p className="text-[10px] text-slate-400">ID: {p.id}</p>
                                                                </td>
                                                                <td className="p-5 text-xs font-normal text-slate-500">{p.unitName}</td>
                                                                <td className="p-5 text-center">
                                                                    <input className="w-20 border-2 border-slate-100 rounded-xl p-2 text-center text-indigo-600 font-black outline-none focus:border-indigo-500" value={p.roomId || ''} placeholder="ว่าง"
                                                                        onChange={async (e) => { const v = e.target.value; await seminarCol.doc(p.docId).update({ roomId: v, roomStatus: v ? 'อนุมัติแล้ว' : 'ปกติ' }); }} />
                                                                </td>
                                                                <td className="p-5 text-center uppercase text-[10px] font-black">
                                                                    <span className={p.roomStatus === 'อนุมัติแล้ว' ? 'text-green-500' : p.roomStatus === 'รออนุมัติ' ? 'text-amber-500 animate-pulse' : 'text-slate-300'}>{p.roomStatus || 'ปกติ'}</span>
                                                                </td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                        <div className="xl:col-span-4 h-fit sticky top-24">
                                            <div className="bg-slate-900 text-white p-8 rounded-[2.5rem] shadow-2xl border border-slate-800 flex flex-col">
                                                <h3 className="font-black uppercase text-sm mb-6 flex items-center gap-2 tracking-widest"><span className="text-indigo-400">●</span> รอจัดที่พัก</h3>
                                                <div className="space-y-3 max-h-[500px] overflow-y-auto no-scrollbar">
                                                    {list.filter(p => !p.roomId).map(p => (
                                                        <div key={p.docId} className="bg-slate-800 p-4 rounded-2xl border border-slate-700 flex flex-col gap-3">
                                                            <div className="font-black text-xs">{p.rank}{p.firstName} {p.lastName}</div>
                                                            <select className="w-full bg-white text-slate-900 text-[10px] font-black p-2.5 rounded-xl outline-none" onChange={(e) => assignRoom(p.docId, e.target.value)} value="">
                                                                <option value="">-- เลือกห้องพัก --</option>
                                                                {rooms.map(r => <option key={r.docId} value={r.roomNo}>{r.roomNo}</option>)}
                                                            </select>
                                                        </div>
                                                    ))}
                                                    {list.filter(p => !p.roomId).length === 0 && <p className="text-slate-500 italic text-center py-6">จัดห้องพักครบถ้วนแล้ว ✓</p>}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {adminSubTab === 'staff' && (
                                    <div className="animate-in fade-in duration-500">
                                        <div className="bg-white rounded-[2.5rem] border-2 border-slate-100 overflow-hidden shadow-sm">
                                            <div className="p-8 bg-slate-50 border-b flex justify-between items-center">
                                                <h3 className="font-black uppercase text-slate-800 tracking-tight">รายชื่อกองอำนวยการ / วิทยากร</h3>
                                            </div>
                                            <div className="overflow-x-auto">
                                                <table className="w-full text-left text-sm font-bold">
                                                    <thead className="bg-slate-100 text-[10px] text-slate-400 uppercase tracking-widest font-black border-b">
                                                        <tr><th className="p-6">ชื่อ-นามสกุล</th><th className="p-6">ประเภท</th><th className="p-6 text-center">จัดห้องพัก</th><th className="p-6 text-center">เลขห้อง</th></tr>
                                                    </thead>
                                                    <tbody className="divide-y text-slate-700">
                                                        {guests.map(g => (
                                                            <tr key={g.docId} className="hover:bg-slate-50 transition-colors">
                                                                <td className="p-6">{g.rank}{g.firstName} {g.lastName}</td>
                                                                <td className="p-6"><span className="text-[10px] uppercase font-black text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">{g.category || 'STAFF'}</span></td>
                                                                <td className="p-6 text-center">
                                                                    <select className="bg-white border-2 border-slate-100 p-2 rounded-xl text-[10px] font-black outline-none" onChange={(e) => assignRoom(g.docId, e.target.value, 'guests')} value={g.roomId || ''}>
                                                                        <option value="">-- Assign --</option>
                                                                        {rooms.map(r => <option key={r.docId} value={r.roomNo}>{r.roomNo}</option>)}
                                                                    </select>
                                                                </td>
                                                                <td className="p-6 text-center text-rose-500 font-black text-lg">{g.roomId || '-'}</td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        ) : (
                            /* ส่วนของ Guest - คงเดิมไม่แตะต้อง */
                            <div className="space-y-6 animate-in fade-in">
                                <div className="text-center md:text-left mb-8">
                                    <h2 className="text-3xl font-black text-slate-800 uppercase tracking-tighter">ขอจับคู่เข้าพัก</h2>
                                    <p className="text-slate-400 text-sm font-bold">เลือกรายชื่อผู้ที่ต้องการพักด้วยกัน (สูงสุด 2 ท่าน)</p>
                                </div>
                                <input className="input-box shadow-sm mb-6" placeholder="ค้นหา ชื่อ, สกุล หรือหน่วย..." onChange={e => setSearchTerm(e.target.value)} />
                                <div className="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden mb-32">
                                    <table className="w-full text-left text-sm font-bold">
                                        <thead className="bg-slate-50 border-b text-[12px] font-black text-slate-400 uppercase tracking-widest">
                                            <tr><th className="p-4 w-[60px] text-center">เลือก</th><th className="p-4">ชื่อ-สกุล</th><th className="p-4 hidden md:table-cell">หน่วย</th><th className="p-4 text-center">สถานะ</th></tr>
                                        </thead>
                                        <tbody className="divide-y text-slate-700 font-bold">
                                            {filteredList.map(i => (
                                                <tr key={i.docId} className={`hover:bg-indigo-50/30 transition-colors ${i.roomStatus === 'รออนุมัติ' ? 'bg-amber-50/30' : ''}`}>
                                                    <td className="p-4 text-center">
                                                        {(!i.roomStatus || i.roomStatus === 'ปกติ') ? (
                                                            <div onClick={() => handleSelect(i)} className={`checkbox-item mx-auto ${selectedIds.includes(i.docId) ? 'active' : ''}`}>
                                                                {selectedIds.includes(i.docId) && "✓"}
                                                            </div>
                                                        ) : ( <div className="checkbox-item locked mx-auto">🔒</div> )}
                                                    </td>
                                                    <td className="p-4">
                                                        <p className="text-slate-800">{i.rank}{i.firstName} {i.lastName}</p>
                                                        <p className="text-[10px] text-slate-400 font-normal">ID: {i.id} {i.roomTypePref === 'พักเดี่ยว' ? '| พักเดี่ยว' : ''}</p>
                                                    </td>
                                                    <td className="p-4 hidden md:table-cell text-xs font-normal text-slate-500">{i.unitName}</td>
                                                    <td className="p-4 text-center">
                                                        {i.roomStatus === 'รออนุมัติ' ? (
                                                            <span className="px-3 py-1 bg-amber-100 text-amber-600 rounded-lg text-[10px] font-black uppercase">รออนุมัติ</span>
                                                        ) : i.roomStatus === 'อนุมัติแล้ว' ? (
                                                            <span className="px-3 py-1 bg-emerald-500 text-white rounded-lg text-[10px] font-black uppercase">ห้อง: {i.roomId}</span>
                                                        ) : ( <span className="text-slate-300">-</span> )}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                {selectedIds.length > 0 && (
                                    <div className="fixed bottom-10 left-0 right-0 flex justify-center px-4 z-40">
                                        <div className="bg-slate-900 text-white px-10 py-5 rounded-[2.5rem] shadow-2xl flex items-center gap-8 border border-slate-700 animate-bounce">
                                            <div className="flex flex-col"><span className="text-[10px] text-indigo-400 font-black uppercase">สถานะ</span><span className="text-sm font-bold">{selectedIds.length === 1 ? `เลือกแล้ว 1 รายการ...` : `เลือกครบ 2 ท่านแล้ว`}</span></div>
                                            {selectedIds.length === 2 && <button onClick={() => setIsConfirming(true)} className="bg-indigo-600 px-6 py-3 rounded-2xl text-xs font-black uppercase hover:bg-indigo-500 shadow-xl">ขอจับคู่เข้าพัก</button>}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Modal Confirm - คงเดิม */}
                    {isConfirming && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-6 animate-in zoom-in duration-300">
                            <div className="bg-white rounded-[2.5rem] p-10 max-w-sm w-full text-center shadow-2xl font-bold">
                                <div className="text-5xl mb-6">🤝</div>
                                <h3 className="text-xl font-black mb-2 uppercase tracking-tight">ยืนยันการจับคู่</h3>
                                <p className="text-sm text-slate-500 mb-8 italic font-medium">เมื่อส่งคำร้องแล้วจะไม่สามารถแก้ไขได้เอง ต้องการดำเนินการต่อหรือไม่?</p>
                                <div className="flex flex-col gap-3">
                                    <button onClick={submitPairing} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase shadow-xl hover:bg-indigo-700 transition-all">ยืนยันข้อมูล</button>
                                    <button onClick={() => setIsConfirming(false)} className="text-slate-400 py-2 text-xs font-black uppercase">ยกเลิก</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
