<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RTMS Check-in Station v1.2.7</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        #reader { width: 100% !important; border: none !important; border-radius: 1.5rem; overflow: hidden; background: #1e293b; position: relative; min-height: 280px; }
        #reader video { object-fit: cover !important; border-radius: 1.5rem; width: 100% !important; height: auto !important; }
        .scan-line { animation: scan 2s linear infinite; height: 2px; background: #6366f1; box-shadow: 0 0 8px #6366f1; z-index: 20; position: absolute; left: 0; right: 0; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        select option { background: #1e293b; color: white; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-4xl flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-lg shadow-lg">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            </div>
            <div>
                <h1 class="text-xl font-black tracking-tighter text-white">RTMS <span class="text-indigo-400">CHECK-IN</span></h1>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Mobile Integration v1.2.7</p>
            </div>
        </div>
        <button onclick="exportCheckInCSV()" class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase shadow-lg active:scale-95 transition-all">
            💾 Export CSV
        </button>
    </header>

    <main class="w-full max-w-4xl grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="space-y-4">
            <div class="bg-slate-800 rounded-3xl p-5 border border-white/5 shadow-2xl">
                <div class="space-y-3 mb-4">
                    <button id="btn-request" onclick="requestPermission()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-2xl text-xs font-black uppercase transition-all shadow-xl active:bg-indigo-700">
                        🔵 คลิกที่นี่เพื่ออนุญาตและเปิดกล้อง
                    </button>
                    
                    <div id="camera-controls" class="hidden space-y-3">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">สลับกล้อง / เลือกเลนส์</label>
                        <select id="camera-select" onchange="startScanner()" class="w-full bg-slate-900 text-white text-xs px-4 py-3 rounded-xl border border-white/10 outline-none appearance-none">
                            <option value="">กำลังโหลดรายชื่อกล้อง...</option>
                        </select>
                    </div>
                </div>
                
                <div id="reader"></div>
            </div>
            
            <div id="status-container" class="text-center p-3 bg-slate-900/50 rounded-2xl border border-white/5">
                <p id="status-text" class="text-indigo-300 font-bold text-[10px] uppercase tracking-widest">สถานะ: รอการกดปุ่มขอสิทธิ์</p>
            </div>
        </div>

        <div id="result-container" class="relative">
            <div id="result-card" class="bg-white text-slate-900 rounded-3xl p-8 shadow-2xl flex flex-col items-center justify-center text-center hidden min-h-[350px] animate-in fade-in zoom-in duration-300">
                <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-6">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                </div>
                <h2 id="res-name" class="text-2xl font-black mb-1">---</h2>
                <p id="res-unit" class="text-indigo-600 font-bold text-sm mb-6">---</p>
                <div class="grid grid-cols-2 gap-4 w-full border-t border-slate-100 pt-6">
                    <div class="text-left">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">ประเภท</p>
                        <p id="res-type" class="font-bold text-sm text-slate-700">-</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">เวลาเข้างาน</p>
                        <p id="res-time" class="font-bold text-sm text-emerald-600">-</p>
                    </div>
                </div>
            </div>

            <div id="standby-card" class="bg-slate-800/40 rounded-3xl p-8 border-2 border-dashed border-white/10 flex flex-col items-center justify-center text-center min-h-[350px]">
                <div class="w-16 h-16 bg-slate-700 rounded-full flex items-center justify-center mb-4 opacity-40">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><rect x="7" y="7" width="3" height="3"></rect><rect x="14" y="7" width="3" height="3"></rect><rect x="7" y="14" width="3" height="3"></rect><rect x="14" y="14" width="3" height="3"></rect></svg>
                </div>
                <p class="text-slate-500 font-bold uppercase tracking-[0.2em] text-[10px]">Ready for Scan</p>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyClnFib72Jwn2umtlG0fD4jBaE-aG1ceWk",
            authDomain: "rtcdb-66284.firebaseapp.com",
            projectId: "rtcdb-66284",
            appId: "1:800467259752:web:961e90546df3390e2b06dd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const appId = "military-system-v12";

        let html5Qr;
        let isProcessing = false;

        // ฟังก์ชันขอสิทธิ์กล้อง (รองรับทั้ง PC/Mobile)
        async function requestPermission() {
            const statusText = document.getElementById('status-text');
            const btnRequest = document.getElementById('btn-request');
            const controls = document.getElementById('camera-controls');

            try {
                statusText.innerText = "⏳ กำลังเรียกสิทธิ์กล้อง...";
                
                // 1. บังคับขอสิทธิ์เบื้องต้น
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                stream.getTracks().forEach(track => track.stop()); // ปิดทันทีหลังได้สิทธิ์
                
                // 2. ดึงรายชื่อกล้อง
                const devices = await Html5Qrcode.getCameras();
                if (devices && devices.length > 0) {
                    const select = document.getElementById('camera-select');
                    select.innerHTML = '';
                    
                    // จัดลำดับ: เอากล้องหลัง (Back/Rear) ขึ้นก่อน
                    devices.sort((a, b) => {
                        const label = a.label.toLowerCase();
                        if (label.includes('back') || label.includes('rear') || label.includes('environment')) return -1;
                        return 1;
                    });

                    devices.forEach((device, index) => {
                        const opt = document.createElement('option');
                        opt.value = device.id;
                        opt.text = device.label || `Camera ${index + 1}`;
                        select.appendChild(opt);
                    });

                    btnRequest.classList.add('hidden');
                    controls.classList.remove('hidden');
                    statusText.innerText = "✅ ได้รับสิทธิ์กล้องแล้ว";
                    
                    // เริ่มต้นสแกนด้วยกล้องตัวแรกในลิสต์ (ซึ่งมักจะเป็นกล้องหลัง)
                    startScanner();
                } else {
                    throw new Error("ไม่พบอุปกรณ์กล้อง");
                }
            } catch (err) {
                statusText.innerText = "❌ เกิดข้อผิดพลาด: " + err.message;
                alert("กรุณาอนุญาตให้เข้าถึงกล้องใน Site Settings ของ Browser\n(คลิกรูปแม่กุญแจที่ Address Bar)");
            }
        }

        function startScanner() {
            const cameraId = document.getElementById('camera-select').value;
            const statusText = document.getElementById('status-text');

            if (html5Qr) {
                html5Qr.stop().then(() => doStart(cameraId)).catch(() => doStart(cameraId));
            } else {
                doStart(cameraId);
            }
        }

        function doStart(cameraId) {
            html5Qr = new Html5Qrcode("reader");
            const config = { 
                fps: 20, 
                qrbox: { width: 260, height: 260 },
                aspectRatio: 1.0
            };
            
            html5Qr.start(cameraId, config, onScanSuccess)
            .then(() => {
                document.getElementById('status-text').innerText = "🟢 สแกนเนอร์เปิดใช้งานแล้ว";
            })
            .catch(err => { 
                document.getElementById('status-text').innerText = `❌ ไม่สามารถเริ่มกล้องนี้ได้: ${err}`; 
            });
        }

        async function onScanSuccess(decodedText) {
            if (isProcessing) return;
            isProcessing = true;

            try {
                // วิเคราะห์รหัส (รองรับ ID ตรงๆ และแบบมี ?p=)
                let personId = decodedText.includes('?p=') ? 
                               decodedText.split('?p=')[1].split('&')[0].toUpperCase() : 
                               decodedText.trim().toUpperCase();
                
                let personData = null;
                let colName = '';

                // ค้นหาใน Firestore (Seminar/Guests)
                const semDoc = await db.collection(`artifacts/${appId}/public/data/seminar`).doc(personId).get();
                if (semDoc.exists) {
                    personData = semDoc.data();
                    colName = 'Seminar';
                } else {
                    const guestDoc = await db.collection(`artifacts/${appId}/public/data/guests`).doc(personId).get();
                    if (guestDoc.exists) {
                        personData = guestDoc.data();
                        colName = personData.category || 'Guest';
                    }
                }

                if (personData) {
                    const now = new Date();
                    const timeStr = now.toLocaleTimeString('th-TH');

                    // แสดงผลลัพธ์
                    document.getElementById('res-name').innerText = `${personData.rank || ''} ${personData.firstName} ${personData.lastName}`;
                    document.getElementById('res-unit').innerText = personData.unitName || personData.unit || 'ไม่ระบุหน่วย';
                    document.getElementById('res-type').innerText = colName;
                    document.getElementById('res-time').innerText = timeStr;

                    document.getElementById('standby-card').classList.add('hidden');
                    document.getElementById('result-card').classList.remove('hidden');

                    // บันทึก Log
                    await db.collection(`artifacts/${appId}/public/data/checkins`).add({
                        personId: personId,
                        name: `${personData.rank || ''} ${personData.firstName} ${personData.lastName}`,
                        unit: personData.unitName || personData.unit || '-',
                        type: colName,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        checkInDate: now.toLocaleString('th-TH')
                    });

                    new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();

                    setTimeout(() => {
                        document.getElementById('result-card').classList.add('hidden');
                        document.getElementById('standby-card').classList.remove('hidden');
                        isProcessing = false;
                    }, 4000);
                } else {
                    alert("⚠️ ไม่พบข้อมูลรหัส: " + personId);
                    isProcessing = false;
                }
            } catch (err) {
                console.error(err);
                isProcessing = false;
            }
        }

        async function exportCheckInCSV() {
            try {
                const snap = await db.collection(`artifacts/${appId}/public/data/checkins`).orderBy('timestamp', 'desc').get();
                if (snap.empty) return alert("ไม่มีข้อมูลเช็คอิน");
                
                const data = snap.docs.map(doc => ({
                    "รหัส": doc.data().personId,
                    "ชื่อ-นามสกุล": doc.data().name,
                    "หน่วยงาน": doc.data().unit,
                    "ประเภท": doc.data().type,
                    "เวลาเช็คอิน": doc.data().checkInDate
                }));

                const csv = Papa.unparse(data);
                const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `RTMS_CheckIn_${new Date().getTime()}.csv`;
                a.click();
            } catch (err) { alert("Error Exporting Data"); }
        }
    </script>
</body>
</html>
